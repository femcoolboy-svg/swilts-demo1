<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILTS — Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.dark {
            --bg-primary: #0a0c10;
            --bg-card: #1a1b1e;
            --bg-input: #1e1f22;
            --text-primary: #dbdee1;
            --text-secondary: #949ba4;
            --border: #2b2d31;
            --accent: #5865f2;
            --danger: #ed4245;
            --success: #23a55a;
            --gradient: linear-gradient(135deg, #5865f2, #4752c4);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        body.light {
            --bg-primary: #f2f3f5;
            --bg-card: #ffffff;
            --bg-input: #eef2f5;
            --text-primary: #2e3035;
            --text-secondary: #5c5e66;
            --border: #e3e5e8;
            --accent: #5865f2;
            --danger: #ed4245;
            --success: #23a55a;
            --gradient: linear-gradient(135deg, #5865f2, #4752c4);
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            transition: all 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .btn-plus {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a1a2e;
            font-weight: bold;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--bg-card);
            border-radius: 28px;
            border: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .plus-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid var(--bg-card);
        }

        .grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
        }

        @media (max-width: 1000px) {
            .grid { grid-template-columns: 1fr; }
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            height: 580px;
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-primary);
        }

        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 22px;
            word-wrap: break-word;
        }

        .message-own {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message-other {
            align-self: flex-start;
            background: var(--bg-input);
            border-bottom-left-radius: 6px;
        }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
        }

        .profile-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 4px solid var(--bg-card);
            margin: 0 auto;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            overflow: hidden;
            position: relative;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-plus-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid var(--bg-card);
        }

        .profile-name {
            text-align: center;
            margin-top: 12px;
            font-weight: 700;
            font-size: 18px;
        }

        .profile-bio {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .profile-plus-until {
            font-size: 12px;
            margin-top: 4px;
            color: var(--text-secondary);
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 16px 0;
            padding: 14px;
            background: var(--bg-input);
            border-radius: 20px;
        }

        .stat-value {
            font-weight: 700;
            font-size: 22px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .menu-item {
            padding: 12px;
            margin: 8px 0;
            background: var(--bg-input);
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
        }

        .list {
            max-height: 280px;
            overflow-y: auto;
        }

        .list-item {
            background: var(--bg-input);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .auth-card {
            max-width: 460px;
            margin: 80px auto;
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
        }

        .hidden { display: none; }
        .text-center { text-align: center; }
        .error { color: var(--danger); }
        .success { color: var(--success); }

        input, select {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
    </style>
</head>
<body class="dark">
<div class="container">
    <!-- АВТОРИЗАЦИЯ -->
    <div id="authPanel">
        <div class="auth-card">
            <h1 style="text-align:center;margin-bottom:32px;">🔷 SWILTS</h1>
            <div id="authForm">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button class="btn btn-primary" id="loginBtn" style="width:100%;">Войти</button>
                <button class="btn btn-secondary" id="showRegisterBtn" style="width:100%; margin-top:12px;">Создать аккаунт</button>
                <div id="authMsg" class="error text-center mt-2"></div>
            </div>
            <div id="regForm" class="hidden">
                <input type="text" id="regUsername" placeholder="Никнейм">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regCaptcha" placeholder="Капча">
                <div id="captchaQuestion" class="text-center mb-2">Введите число: 42</div>
                <button class="btn btn-primary" id="registerBtn" style="width:100%;">Зарегистрироваться</button>
                <button class="btn btn-secondary" id="backToLoginBtn" style="width:100%; margin-top:12px;">Назад</button>
                <div id="regMsg" class="text-center mt-2"></div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="mainPanel" class="hidden">
        <div class="header">
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div>
                    <div class="user-name" id="userName"></div>
                    <div class="user-tag" id="userTag"></div>
                </div>
                <div id="plusBadge" class="plus-badge hidden">💎</div>
            </div>
            <div>
                <button class="btn btn-secondary" id="themeDarkBtn">🌙 Тёмная</button>
                <button class="btn btn-secondary" id="themeLightBtn">☀️ Светлая</button>
                <button class="btn btn-danger" id="logoutBtn">Выйти</button>
                <button class="btn btn-plus" id="plusBtn">💎 SWILTS+</button>
            </div>
        </div>

        <div class="grid">
            <!-- ЛЕВАЯ КОЛОНКА -->
            <div>
                <div class="card">
                    <h3>🔍 Поиск</h3>
                    <div style="display:flex;gap:10px;">
                        <input type="text" id="searchInput" placeholder="Никнейм">
                        <button class="btn btn-primary" id="searchBtn">Найти</button>
                    </div>
                    <div id="searchResults" class="list mt-2"></div>
                </div>

                <div class="card mt-2">
                    <h3>📨 Запросы в друзья</h3>
                    <div id="requestsList" class="list"></div>
                </div>

                <div class="card mt-2">
                    <h3>👥 Друзья</h3>
                    <div id="friendsList" class="list"></div>
                </div>

                <div class="card mt-2">
                    <h3>💬 Группы</h3>
                    <button class="btn btn-primary" id="createGroupBtn" style="width:100%;margin-bottom:12px;">+ Создать группу</button>
                    <div id="groupsList" class="list"></div>
                </div>

                <div id="adminPanel" class="card mt-2 hidden">
                    <h3>👑 Админ панель</h3>
                    <div class="menu-item" id="allUsersBtn">Все пользователи</div>
                    <div id="usersList" class="list hidden mt-2"></div>
                </div>
            </div>

            <!-- ЦЕНТР - ЧАТ -->
            <div class="chat-area">
                <div style="padding:16px;border-bottom:1px solid var(--border);">
                    <select id="chatType" style="width:100%;">
                        <option value="private">💬 Личные сообщения</option>
                        <option value="group">👥 Групповой чат</option>
                    </select>
                    <select id="friendSelect" class="hidden mt-2" style="width:100%;"></select>
                    <select id="groupSelect" class="hidden mt-2" style="width:100%;"></select>
                </div>
                <div id="messages" class="messages">
                    <div class="text-center" style="margin-top:40px;">👈 Выберите чат</div>
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button class="btn btn-primary" id="sendMsgBtn">Отправить</button>
                </div>
            </div>

            <!-- ПРАВАЯ КОЛОНКА - ПРОФИЛЬ -->
            <div>
                <div class="card">
                    <div class="profile-avatar" id="profileAvatar">
                        👤
                        <div id="profilePlusBadge" class="profile-plus-badge hidden">💎</div>
                    </div>
                    <div class="profile-name" id="profileName"></div>
                    <div id="profilePlusUntil" class="profile-plus-until"></div>
                    <div class="profile-bio" id="profileBio"></div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="friendsCount">0</div>
                            <div class="stat-label">друзей</div>
                        </div>

                            <div class="stat-value" id="requestsCount">0</div>
                            <div class="stat-label">запросов</div>
                        </div>

                            <div class="stat-value" id="groupsCount">0</div>
                            <div class="stat-label">групп</div>
                        </div>
                    </div>
                    <div class="menu-item" id="editAvatarBtn">📷 Сменить аватар</div>
                    <div class="menu-item" id="editGifAvatarBtn">🎬 GIF-аватар (Plus)</div>
                    <div class="menu-item" id="editBannerBtn">🖼️ Сменить баннер</div>
                    <div class="menu-item" id="changeUsernameBtn">✏️ Сменить ник</div>
                    <div class="menu-item" id="editStatusBtn">🟢 Сменить статус</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
let currentUser = null;
let currentChatType = 'private';
let currentChatId = null;
let socket = null;

// ============ ТЕМА ============
function setTheme(theme) {
    if (theme === 'light') {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
    } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
    }
    localStorage.setItem('theme', theme);
}
setTheme(localStorage.getItem('theme') || 'dark');
document.getElementById('themeDarkBtn').onclick = () => setTheme('dark');
document.getElementById('themeLightBtn').onclick = () => setTheme('light');

// ============ WEBSOCKET ============
function initSocket() {
    socket = io();
    socket.on('connect', () => {
        if (currentUser) socket.emit('register', currentUser.id);
    });
    socket.on('private-message', (data) => {
        if (currentChatType === 'private' && currentChatId === data.from) {
            appendMessage(data.msg, false);
        }
        loadFriends();
    });
    socket.on('group-message', (data) => {
        if (currentChatType === 'group' && currentChatId === data.group) {
            appendMessage(data.msg, false);
        }
    });
}

function appendMessage(msg, isOwn) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
    div.innerHTML = `${escapeHtml(msg)}<div class="message-time">${new Date().toLocaleTimeString()}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

// ============ ПРОФИЛЬ (ПРАВАЯ КОЛОНКА) ============
function updateProfileDisplay() {
    const profileName = document.getElementById('profileName');
    const profileBio = document.getElementById('profileBio');
    const profilePlusUntil = document.getElementById('profilePlusUntil');
    const plusBadge = document.getElementById('plusBadge');
    const profilePlusBadge = document.getElementById('profilePlusBadge');
    const userAvatar = document.getElementById('userAvatar');
    const profileAvatar = document.getElementById('profileAvatar');
    const userName = document.getElementById('userName');
    const userTag = document.getElementById('userTag');

    if (userName) userName.innerText = currentUser.username;
    if (userTag) userTag.innerText = '#' + currentUser.tag;
    if (profileName) profileName.innerText = currentUser.username + '#' + currentUser.tag;

    // Премиум значок
    if (currentUser.hasPlus) {
        if (plusBadge) plusBadge.classList.remove('hidden');
        if (profilePlusBadge) profilePlusBadge.classList.remove('hidden');
        if (currentUser.plus_badge) {
            if (plusBadge) plusBadge.innerHTML = currentUser.plus_badge;
            if (profilePlusBadge) profilePlusBadge.innerHTML = currentUser.plus_badge;
        }
        // Цвет ника
        if (currentUser.plus_color) {
            if (userName) userName.style.color = currentUser.plus_color;
            if (profileName) profileName.style.color = currentUser.plus_color;
        }
    } else {
        if (plusBadge) plusBadge.classList.add('hidden');
        if (profilePlusBadge) profilePlusBadge.classList.add('hidden');
    }

    // ДАТА ОКОНЧАНИЯ ПОДПИСКИ
    if (profilePlusUntil) {
        if (currentUser.hasPlus && currentUser.plus_until) {
            const date = new Date(currentUser.plus_until);
            profilePlusUntil.innerHTML = `💎 Премиум до: ${date.toLocaleDateString('ru-RU')}`;
            profilePlusUntil.style.color = '#FBBF24';
        } else if (currentUser.hasPlus && !currentUser.plus_until) {
            profilePlusUntil.innerHTML = `💎 Премиум активен`;
            profilePlusUntil.style.color = '#FBBF24';
        } else {
            profilePlusUntil.innerHTML = '';
        }
    }

    // Аватар
    const avatarUrl = currentUser.plus_animated_avatar || currentUser.avatar;
    if (avatarUrl) {
        if (userAvatar) userAvatar.innerHTML = `<img src="${avatarUrl}">`;
        if (profileAvatar) profileAvatar.innerHTML = `<img src="${avatarUrl}"><div id="profilePlusBadge" class="profile-plus-badge hidden">${currentUser.plus_badge || '💎'}</div>`;
        if (profileAvatar && currentUser.hasPlus) {
            const badge = profileAvatar.querySelector('#profilePlusBadge');
            if (badge) badge.classList.remove('hidden');
        }
    } else {
        if (userAvatar) userAvatar.innerHTML = currentUser.username ? currentUser.username[0].toUpperCase() : '👤';
        if (profileAvatar) profileAvatar.innerHTML = currentUser.username ? currentUser.username[0].toUpperCase() : '👤';
    }

    // Био
    if (profileBio) {
        profileBio.innerText = currentUser.bio || '✨ Новый пользователь';
    }
}

// ============ ДРУЗЬЯ ============
async function loadFriends() {
    const res = await fetch('/friends', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });
    const data = await res.json();
    document.getElementById('friendsCount').innerText = data.friends.length;
    const container = document.getElementById('friendsList');
    const select = document.getElementById('friendSelect');
    container.innerHTML = '';
    select.innerHTML = '<option value="">-- Выберите друга --</option>';
    data.friends.forEach(f => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.onclick = () => {
            currentChatType = 'private';
            currentChatId = f.id;
            document.getElementById('chatType').value = 'private';
            switchChat();
        };
        div.innerHTML = `<strong>${f.username}#${f.tag}</strong>`;
        container.appendChild(div);
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.text = `${f.username}#${f.tag}`;
        select.appendChild(opt);
    });
}

async function loadRequests() {
    const res = await fetch('/requests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });
    const data = await res.json();
    document.getElementById('requestsCount').innerText = data.requests.length;
    const container = document.getElementById('requestsList');
    container.innerHTML = '';
    data.requests.forEach(req => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<span>${req.username}#${req.tag}</span>
                         <div>
                             <button class="btn btn-success" onclick="acceptReq(${req.id}, ${req.user_id})">✅</button>
                             <button class="btn btn-danger" onclick="declineReq(${req.id})">❌</button>
                         </div>`;
        container.appendChild(div);
    });
}

async function loadGroups() {
    const res = await fetch('/groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });
    const data = await res.json();
    document.getElementById('groupsCount').innerText = data.groups.length;
    const container = document.getElementById('groupsList');
    const select = document.getElementById('groupSelect');
    container.innerHTML = '';
    select.innerHTML = '<option value="">-- Выберите группу --</option>';
    data.groups.forEach(g => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.onclick = () => {
            currentChatType = 'group';
            currentChatId = g.id;
            document.getElementById('chatType').value = 'group';
            switchChat();
            socket.emit('join-group', g.id);
        };
        div.innerHTML = `<strong>${g.name}</strong>`;
        container.appendChild(div);
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.text = g.name;
        select.appendChild(opt);
    });
}

window.acceptReq = async (id, fromId) => {
    await fetch('/friend/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, from: fromId, to: currentUser.id })
    });
    loadFriends();
    loadRequests();
};

window.declineReq = async (id) => {
    await fetch('/friend/decline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
    });
    loadRequests();
};

// ============ ПОИСК ============
document.getElementById('searchBtn').onclick = async () => {
    const query = document.getElementById('searchInput').value;
    if (!query) return;
    const res = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: query })
    });
    const data = await res.json();
    const container = document.getElementById('searchResults');
    container.innerHTML = '';
    data.users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<span>${u.username}#${u.tag}</span>
                        <button class="btn btn-success" onclick="addFriend(${u.id})">➕</button>`;
        container.appendChild(div);
    });
};

async function addFriend(id) {
    await fetch('/friend/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: currentUser.id, to: id })
    });
    alert('Запрос отправлен');
}

// ============ СООБЩЕНИЯ ============
async function loadPrivateMessages() {
    if (!currentChatId) return;
    const res = await fetch('/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ u1: currentUser.id, u2: currentChatId })
    });
    const data = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    data.messages.forEach(m => {
        const isOwn = m.from_user_id === currentUser.id;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
        div.innerHTML = `${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
}

async function loadGroupMessages() {
    if (!currentChatId) return;
    const res = await fetch('/group/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ groupId: currentChatId })
    });
    const data = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    data.messages.forEach(m => {
        const isOwn = m.from_user_id === currentUser.id;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
        div.innerHTML = `<strong>${m.fromName}:</strong> ${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
}

function switchChat() {
    if (currentChatType === 'private') {
        document.getElementById('friendSelect').classList.remove('hidden');
        document.getElementById('groupSelect').classList.add('hidden');
        loadPrivateMessages();
    } else {
        document.getElementById('friendSelect').classList.add('hidden');
        document.getElementById('groupSelect').classList.remove('hidden');
        loadGroupMessages();
    }
}

async function sendMessage() {
    const msg = document.getElementById('messageInput').value;
    if (!msg || !currentChatId) return;
    if (currentChatType === 'private') {
        appendMessage(msg, true);
        socket.emit('private-message', { from: currentUser.id, to: currentChatId, msg, fromName: currentUser.username });
    } else {
        appendMessage(msg, true);
        socket.emit('group-message', { group: currentChatId, from: currentUser.id, fromName: currentUser.username, msg });
    }
    document.getElementById('messageInput').value = '';
}

document.getElementById('chatType').onchange = (e) => {
    currentChatType = e.target.value;
    if (currentChatType === 'private') currentChatId = document.getElementById('friendSelect').value;
    else currentChatId = document.getElementById('groupSelect').value;
    switchChat();
};
document.getElementById('friendSelect').onchange = () => {
    currentChatId = document.getElementById('friendSelect').value;
    switchChat();
};
document.getElementById('groupSelect').onchange = () => {
    currentChatId = document.getElementById('groupSelect').value;
    switchChat();
};
document.getElementById('sendMsgBtn').onclick = sendMessage;
document.getElementById('messageInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});

// ============ ГРУППЫ ============
document.getElementById('createGroupBtn').onclick = async () => {
    const name = prompt('Название группы:');
    if (!name) return;
    const friendsRes = await fetch('/friends', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });
    const friendsData = await friendsRes.json();
    if (friendsData.friends.length < 2) {
        alert('Нужно минимум 2 друга');
        return;
    }
    const selected = [];
    const members = prompt('Введите ID друзей через запятую (минимум 2):');
    if (!members) return;
    const ids = members.split(',').map(Number).filter(n => !isNaN(n));
    if (ids.length < 2) {
        alert('Выберите минимум 2 друга');
        return;
    }
    const res = await fetch('/group/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, owner: currentUser.id, members: ids })
    });
    const data = await res.json();
    if (data.success) {
        alert('Группа создана');
        loadGroups();
    } else {
        alert('Ошибка: ' + data.error);
    }
};

// ============ АДМИН ============
async function loadAdmin() {
    if (currentUser.username === 'prisanok') {
        document.getElementById('adminPanel').classList.remove('hidden');
    }
}

document.getElementById('allUsersBtn').onclick = async () => {
    const container = document.getElementById('usersList');
    if (container.classList.contains('hidden')) {
        const res = await fetch('/all-users');
        const data = await res.json();
        container.innerHTML = '';
        data.users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${u.username}#${u.tag} ${u.banned ? '(забанен)' : ''}</span>
                            <button class="btn btn-danger" onclick="banUser(${u.id})">Бан</button>`;
            container.appendChild(div);
        });
        container.classList.remove('hidden');
    } else {
        container.classList.add('hidden');
    }
};

window.banUser = async (id) => {
    const reason = prompt('Причина бана:');
    if (!reason) return;
    await fetch('/ban', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: id, reason })
    });
    alert('Пользователь забанен');
    document.getElementById('usersList').classList.add('hidden');
};

// ============ ПРОФИЛЬ НАСТРОЙКИ ============
function uploadFile(url, field) {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch(url, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
            alert('Загружено! Перезайдите');
            location.reload();
        } else {
            alert('Ошибка: ' + (data.error || 'Неизвестно'));
        }
    };
    input.click();
}

// ============ АВТОРИЗАЦИЯ ============
async function checkSession() {
    const res = await fetch('/session');
    const data = await res.json();
    if (data.success && data.user) {
        currentUser = data.user;
        showMain();
    }
}

async function login() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
        currentUser = data.user;
        showMain();
    } else {
        document.getElementById('authMsg').innerText = data.error;
    }
}

async function register() {
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const captcha = document.getElementById('regCaptcha').value;
    const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, captcha, ip: '0.0.0.0' })
    });
    const data = await res.json();
    if (data.success) {
        currentUser = data.user;
        showMain();
    } else {
        document.getElementById('regMsg').innerHTML = '<span class="error">' + data.error + '</span>';
    }
}

function showMain() {
    document.getElementById('authPanel').classList.add('hidden');
    document.getElementById('mainPanel').classList.remove('hidden');
    updateProfileDisplay();
    loadFriends();
    loadRequests();
    loadGroups();
    loadAdmin();
    initSocket();
}

document.getElementById('loginBtn').onclick = login;
document.getElementById('showRegisterBtn').onclick = () => {
    document.getElementById('authForm').classList.add('hidden');
    document.getElementById('regForm').classList.remove('hidden');
};
document.getElementById('backToLoginBtn').onclick = () => {
    document.getElementById('regForm').classList.add('hidden');
    document.getElementById('authForm').classList.remove('hidden');
};
document.getElementById('registerBtn').onclick = register;
document.getElementById('logoutBtn').onclick = async () => {
    await fetch('/logout', { method: 'POST' });
    location.reload();
};

function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}

checkSession();
