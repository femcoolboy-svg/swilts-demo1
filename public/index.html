<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SWILTS — Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body.dark {
            --bg: #0e0e10;
            --card: #1a1a2e;
            --hover: #2a2a3a;
            --input: #1e1f22;
            --text: #efeff1;
            --text-sec: #949ba4;
            --border: #2a2a3e;
            --accent: #5865f2;
            --danger: #ed4245;
            --success: #23a55a;
            --plus: linear-gradient(135deg, #FFD700, #FFA500);
            --gradient: linear-gradient(135deg, #5865f2, #764ba2);
        }
        body.light {
            --bg: #f2f3f5;
            --card: #ffffff;
            --hover: #eef2f5;
            --input: #eef2f5;
            --text: #2e3035;
            --text-sec: #5c5e66;
            --border: #e3e5e8;
            --accent: #5865f2;
            --danger: #ed4245;
            --success: #23a55a;
            --plus: linear-gradient(135deg, #FFD700, #FFA500);
            --gradient: linear-gradient(135deg, #5865f2, #764ba2);
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .app { display: flex; height: 100vh; width: 100%; }
        
        .servers-sidebar {
            width: 72px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            overflow-y: auto;
        }
        .server-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .server-icon:hover { border-radius: 16px; transform: scale(1.05); }
        .server-icon.active { border-radius: 16px; background: var(--gradient); box-shadow: 0 0 0 3px var(--accent); }
        .server-divider { width: 32px; height: 2px; background: var(--border); margin: 4px 0; }
        
        .chats-sidebar {
            width: 280px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .user-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .user-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            cursor: pointer;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info h3 { font-size: 15px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .user-info p { font-size: 11px; color: var(--text-sec); }
        .plus-badge {
            background: var(--plus);
            border-radius: 50%;
            width: 18px; height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            margin-left: 6px;
            cursor: help;
        }
        .plus-tooltip {
            position: absolute;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .search-box { padding: 12px; border-bottom: 1px solid var(--border); }
        .search-box input {
            width: 100%;
            padding: 10px 12px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 13px;
        }
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2px;
        }
        .chat-item:hover { background: var(--hover); }
        .chat-item.active { background: var(--accent); }
        .chat-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            overflow: hidden;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 500; font-size: 14px; }
        .chat-last-msg { font-size: 11px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
        }
        .chat-header-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 80%;
            animation: slideIn 0.2s;
        }
        .message-own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message-bubble {
            background: var(--input);
            padding: 10px 16px;
            border-radius: 20px;
            max-width: 100%;
        }
        .message-own .message-bubble {
            background: var(--accent);
            color: white;
        }
        .message-name {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--card);
        }
        .input-area input { flex: 1; }
        .input-area button {
            background: var(--accent);
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        
        .right-panel {
            width: 280px;
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
        }
        .profile-card {
            text-align: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .profile-avatar {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: var(--gradient);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-name { font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .profile-bio { font-size: 12px; color: var(--text-sec); margin-top: 4px; }
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-sec);
            margin: 16px 0 8px 0;
        }
        .add-friend-area {
            background: var(--input);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .add-friend-area h4 {
            font-size: 13px;
            margin-bottom: 8px;
        }
        .add-friend-input {
            display: flex;
            gap: 8px;
        }
        .add-friend-input input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
        }
        .add-friend-input button {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        .friend-item, .request-item, .search-item, .user-item {
            background: var(--input);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .setting-btn {
            background: var(--input);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 13px;
            transition: all 0.2s;
        }
        .setting-btn:hover { background: var(--hover); transform: translateX(4px); }
        .hidden { display: none; }
        .error { color: var(--danger); }
        .success { color: var(--success); }
        .text-muted { color: var(--text-sec); }
        .mt-2 { margin-top: 8px; }
        
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e);
        }
        .auth-card {
            background: rgba(30,30,40,0.95);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px;
            width: 420px;
            animation: fadeIn 0.5s;
        }
        .auth-card h1 {
            text-align: center;
            font-size: 42px;
            margin-bottom: 24px;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            color: white;
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-card .secondary { background: rgba(255,255,255,0.1); margin-top: 12px; }
        .captcha-block {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            margin-bottom: 16px;
        }
        .captcha-number { font-size: 28px; font-weight: bold; letter-spacing: 4px; margin-bottom: 8px; }
        
        @media (max-width: 900px) {
            .servers-sidebar { display: none; }
            .right-panel { display: none; }
            .chats-sidebar { width: 100%; }
            .auth-card { width: 90%; padding: 24px; }
        }
    </style>
</head>
<body class="dark">
<!-- АВТОРИЗАЦИЯ -->
<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <h1>🔷 SWILTS</h1>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Никнейм">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="doLogin">Войти</button>
            <button id="showReg" class="secondary">Создать аккаунт</button>
            <div id="loginMsg" style="margin-top:12px; text-align:center; color:#ed4245;"></div>
        </div>
        <div id="regForm" style="display:none;">
            <input type="text" id="regUsername" placeholder="Никнейм">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Пароль">
            <div class="captcha-block">
                <div class="captcha-number" id="captchaNum">0</div>
                <input type="text" id="regCaptcha" placeholder="Введите число">
            </div>
            <button id="doRegister">Зарегистрироваться</button>
            <button id="backToLogin" class="secondary">Назад</button>
            <div id="regMsg" style="margin-top:12px; text-align:center;"></div>
        </div>
    </div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div id="mainApp" style="display:none;">
    <div class="app">
        <div class="servers-sidebar">
            <div class="server-icon active">🏠</div>
            <div class="server-divider"></div>
            <div class="server-icon">👥</div>
            <div class="server-icon">💬</div>
        </div>
        
        <div class="chats-sidebar">
            <div class="user-header">
                <div class="user-avatar" id="sideAvatar">👤</div>
                <div class="user-info">
                    <h3><span id="sideName"></span><span id="sidePlusBadge" class="plus-badge hidden" data-tooltip="">💎</span></h3>
                    <p id="sideTag"></p>
                    <p id="sideCreated" style="font-size:10px;"></p>
                </div>
            </div>
            <div class="search-box"><input type="text" id="searchChatInput" placeholder="Поиск..."></div>
            <div class="chats-list" id="chatsList"><div class="text-muted" style="text-align:center; padding:20px;">Загрузка...</div></div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-avatar" id="chatAvatar">👤</div>
                <div><strong id="chatName">Выберите чат</strong></div>
            </div>
            <div class="messages" id="messages">
                <div class="text-muted" style="text-align:center; margin-top:40px;">👈 Выберите чат</div>
            </div>
            <div class="input-area" id="inputArea" style="display:none;">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="sendBtn">Отправить</button>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="profile-card">
                <div class="profile-avatar" id="profAvatar">👤</div>
                <div class="profile-name" id="profName"></div>
                <div class="profile-bio" id="profBio"></div>
            </div>
            <div class="setting-btn" id="editProfileBtn">🎨 Редактировать профиль</div>
            <div class="setting-btn" id="changePassBtn">🔐 Сменить пароль</div>
            <div class="setting-btn" id="plusBtn" style="background:linear-gradient(135deg,#FFD700,#FFA500); color:#1a1a2e;">💎 SWILTS+</div>
            
            <!-- КРАСИВОЕ ДОБАВЛЕНИЕ В ДРУЗЬЯ -->
            <div class="add-friend-area">
                <h4>➕ Добавить друга</h4>
                <div class="add-friend-input">
                    <input type="text" id="searchUserInput" placeholder="Никнейм (например prisanok)">
                    <button id="searchUserBtn">Найти</button>
                </div>
                <div id="searchResults" class="mt-2"></div>
            </div>
            
            <div id="requestsContainer"></div>
            
            <div class="section-title">💬 Группы</div>
            <button class="setting-btn" id="createGroupBtn" style="background:var(--accent); color:white;">➕ Создать группу</button>

            <div id="adminPanel" class="hidden" style="margin-top:16px;">
                <div class="section-title">👑 АДМИН</div>

                <input type="text" id="trollName" placeholder="Никнейм" class="mt-2" style="width:100%; padding:8px; background:var(--input); border:1px solid var(--border); border-radius:10px; color:var(--text); margin-bottom:8px;">
                <div class="setting-btn" id="allUsersBtn">👥 Все пользователи</div>
                <div id="usersList" class="hidden mt-2"></div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let currentUser = null;
let currentChat = null;
let socket = null;
let captchaValue = 0;
let userIP = '';
fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>userIP=d.ip);

// Тултип для подписки
function showTooltip(e, text) {
    let tooltip = document.createElement('div');
    tooltip.className = 'plus-tooltip';
    tooltip.innerText = text;
    tooltip.style.position = 'absolute';
    tooltip.style.top = (e.pageY - 30) + 'px';
    tooltip.style.left = (e.pageX + 10) + 'px';
    document.body.appendChild(tooltip);
    setTimeout(() => tooltip.remove(), 2000);
}

async function loadCaptcha() {
    const res = await fetch('/captcha');
    const data = await res.json();
    captchaValue = data.captcha;
    document.getElementById('captchaNum').innerText = captchaValue;
}
loadCaptcha();

function setTheme(theme) {
    if (theme === 'light') {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        localStorage.setItem('theme', 'light');
    } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
    }
}
setTheme(localStorage.getItem('theme') || 'dark');

function initSocket() {
    socket = io();
    socket.on('connect', () => { if (currentUser) socket.emit('register', currentUser.id); });
    socket.on('private-message', (data) => {
        if (currentChat?.type === 'friend' && currentChat?.id === data.from) {
            appendMessage(data.msg, false, data.time, data.fromName, data.fromAvatar);
        } else {
            showNotification(data.fromName, data.msg);
        }
        loadChats();
    });
    socket.on('group-message', (data) => {
        if (currentChat?.type === 'group' && currentChat?.id === data.groupId) {
            appendMessage(data.msg, false, data.time, data.fromName, null);
        } else {
            showNotification(data.groupName, data.msg);
        }
        loadChats();
    });
}

function appendMessage(msg, isOwn, time, username, avatar) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'message-own' : ''}`;
    let avatarHtml = '';
    if (!isOwn) {
        if (avatar) {
            avatarHtml = `<div class="message-avatar"><img src="${avatar}"></div>`;
        } else {
            avatarHtml = `<div class="message-avatar">${username ? username[0] : '?'}</div>`;
        }
    }
    div.innerHTML = avatarHtml + `<div class="message-bubble"><div class="message-name">${!isOwn ? (username || '') : ''}</div>${escapeHtml(msg)}<div class="message-time">${new Date(time).toLocaleTimeString()}</div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showNotification(sender, msg) {
    const notif = document.createElement('div');
    notif.style.position = 'fixed';
    notif.style.bottom = '20px';
    notif.style.right = '20px';
    notif.style.background = 'var(--accent)';
    notif.style.color = 'white';
    notif.style.padding = '12px 20px';
    notif.style.borderRadius = '12px';
    notif.style.zIndex = '1000';
    notif.innerHTML = `<strong>📩 ${sender}</strong><br>${msg.substring(0, 50)}`;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

async function loadChats() {
    const friendsRes = await fetch('/friends', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });
    const friendsData = await friendsRes.json();
    const groupsRes = await fetch('/groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });
    const groupsData = await groupsRes.json();
    const container = document.getElementById('chatsList');
    container.innerHTML = '';
    if (friendsData.friends) {
        friendsData.friends.forEach(f => {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChat?.type === 'friend' && currentChat?.id === f.id ? 'active' : ''}`;
            div.onclick = () => selectChat('friend', f.id, f.username, f.avatar);
            div.innerHTML = `<div class="chat-avatar">${f.avatar ? `<img src="${f.avatar}">` : f.username[0]}</div>
                            <div class="chat-info"><div class="chat-name">${f.username}</div><div class="chat-last-msg">#${f.tag}</div></div>`;
            container.appendChild(div);
        });
    }
    if (groupsData.groups) {
        groupsData.groups.forEach(g => {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChat?.type === 'group' && currentChat?.id === g.id ? 'active' : ''}`;
            div.onclick = () => selectChat('group', g.id, g.name, g.avatar);
            div.innerHTML = `<div class="chat-avatar">${g.avatar ? `<img src="${g.avatar}">` : '👥'}</div>
                            <div class="chat-info"><div class="chat-name">${g.name}</div></div>`;
            container.appendChild(div);
        });
    }
    if ((!friendsData.friends || friendsData.friends.length === 0) && (!groupsData.groups || groupsData.groups.length === 0)) {
        container.innerHTML = '<div class="text-muted" style="text-align:center; padding:20px;">Нет чатов</div>';
    }
}

async function selectChat(type, id, name, avatar) {
    currentChat = { type, id, name };
    document.getElementById('chatName').innerHTML = name;
    document.getElementById('chatAvatar').innerHTML = avatar ? `<img src="${avatar}" style="width:100%;height:100%;border-radius:50%;">` : (type === 'friend' ? '👤' : '👥');
    document.getElementById('inputArea').style.display = 'flex';
    await loadMessages();
    loadChats();
}

async function loadMessages() {
    if (!currentChat) return;
    let url = currentChat.type === 'friend' ? '/messages' : '/group/messages';
    let body = currentChat.type === 'friend' ? { u1: currentUser.id, u2: currentChat.id } : { groupId: currentChat.id };
    const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    const data = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    if (data.messages) {
        data.messages.forEach(m => {
            const isOwn = m.from_user_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'message-own' : ''}`;
            let avatarHtml = '';
            if (!isOwn && m.fromAvatar) {
                avatarHtml = `<div class="message-avatar"><img src="${m.fromAvatar}"></div>`;
            } else if (!isOwn && m.fromName) {
                avatarHtml = `<div class="message-avatar">${m.fromName[0]}</div>`;
            }
            div.innerHTML = avatarHtml + `<div class="message-bubble"><div class="message-name">${!isOwn ? (m.fromName || '') : ''}</div>${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div></div>`;
            container.appendChild(div);
        });
    }
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    const msg = document.getElementById('messageInput').value;
    if (!msg || !currentChat) return;
    if (currentChat.type === 'friend') {
        appendMessage(msg, true, new Date(), null, null);
        socket.emit('private-message', {
            from: currentUser.id,
            to: currentChat.id,
            msg: msg,
            fromName: currentUser.username,
            fromAvatar: currentUser.avatar
        });
        await fetch('/send-message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from_user_id: currentUser.id, to_user_id: currentChat.id, message: msg })
        });
    } else {
        appendMessage(msg, true, new Date(), null, null);
        socket.emit('group-message', {
            groupId: currentChat.id,
            from: currentUser.id,
            fromName: currentUser.username,
            msg: msg,
            groupName: currentChat.name
        });
        await fetch('/group/send-message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ group_id: currentChat.id, from_user_id: currentUser.id, message: msg })
        });
    }
    document.getElementById('messageInput').value = '';
}

document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
document.getElementById('messageInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}
