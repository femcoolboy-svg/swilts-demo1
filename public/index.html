<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SWILTS — Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body.dark {
            --bg: #0e0e10;
            --card: #1a1a2e;
            --hover: #2a2a3a;
            --input: #1e1f22;
            --text: #efeff1;
            --text-sec: #949ba4;
            --border: #2a2a3e;
            --accent: #5865f2;
            --danger: #ed4245;
            --success: #23a55a;
        }

        body.light {
            --bg: #f2f3f5;
            --card: #ffffff;
            --hover: #eef2f5;
            --input: #eef2f5;
            --text: #2e3035;
            --text-sec: #5c5e66;
            --border: #e3e5e8;
            --accent: #5865f2;
            --danger: #ed4245;
            --success: #23a55a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            transition: all 0.3s;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* ОБЩИЕ КНОПКИ */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-secondary { background: var(--hover); color: var(--text); }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
        }
        input:focus { outline: none; border-color: var(--accent); }

        /* ШАПКА */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 16px 24px;
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
        }
        .logo { font-size: 24px; font-weight: 700; color: var(--accent); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
            cursor: pointer;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 600; font-size: 16px; }
        .user-tag { font-size: 12px; color: var(--text-sec); }

        /* ОСНОВНАЯ СЕТКА */
        .main-grid {
            display: flex;
            gap: 20px;
        }

        /* ЛЕВАЯ ПАНЕЛЬ (ДРУЗЬЯ) */
        .friends-panel {
            width: 280px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 16px;
        }
        .search-friends {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .search-friends input { font-size: 13px; padding: 10px 12px; }
        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            max-height: 500px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }
        .friend-item:hover { background: var(--hover); }
        .friend-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
        }
        .friend-name { font-weight: 500; font-size: 15px; }
        .friend-tag { font-size: 11px; color: var(--text-sec); }

        /* ЦЕНТРАЛЬНЫЙ ЧАТ */
        .chat-panel {
            flex: 1;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 550px;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 18px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .message-own {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-other {
            align-self: flex-start;
            background: var(--input);
            border-bottom-left-radius: 4px;
        }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px;
            border-top: 1px solid var(--border);
        }
        .input-area input { flex: 1; }

        /* ПРАВАЯ ПАНЕЛЬ */
        .profile-panel {
            width: 280px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 20px;
        }
        .profile-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-name { text-align: center; font-weight: 600; font-size: 18px; margin-bottom: 4px; }
        .profile-bio { text-align: center; font-size: 12px; color: var(--text-sec); margin-bottom: 20px; }

        .setting-btn {
            padding: 12px;
            background: var(--input);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .setting-btn:hover { background: var(--hover); transform: translateX(4px); }

        .request-item, .search-result-item {
            background: var(--input);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* АВТОРИЗАЦИЯ */
        .auth-card {
            max-width: 450px;
            margin: 80px auto;
            background: var(--card);
            border-radius: 28px;
            padding: 40px;
            border: 1px solid var(--border);
        }
        .auth-card h1 { text-align: center; margin-bottom: 28px; font-size: 42px; color: var(--accent); }
        .auth-card input { margin-bottom: 16px; }
        .auth-card button { margin-top: 8px; }

        .hidden { display: none; }
        .error { color: var(--danger); }
        .success { color: var(--success); }
        .text-center { text-align: center; }
        .text-muted { color: var(--text-sec); }
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }

        @media (max-width: 900px) {
            .main-grid { flex-direction: column; }
            .friends-panel { width: 100%; max-height: 300px; }
            .profile-panel { width: 100%; }
        }
    </style>
</head>
<body class="dark">
<div class="container">
    <!-- АВТОРИЗАЦИЯ -->
    <div id="authPanel">
        <div class="auth-card">
            <h1>🔷 SWILTS</h1>
            <div id="authForm">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button class="btn btn-primary" id="loginBtn" style="width:100%;">Войти</button>
                <button class="btn btn-secondary" id="showRegisterBtn" style="width:100%; margin-top:10px;">Создать аккаунт</button>
                <div id="authMsg" class="error text-center mt-2"></div>
            </div>
            <div id="regForm" class="hidden">
                <input type="text" id="regUsername" placeholder="Никнейм">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль">
                <div id="captchaBlock">
                    <input type="text" id="regCaptcha" placeholder="Введите число с картинки">
                    <div id="captchaQuestion" class="text-muted text-center mt-2 mb-2" style="font-size: 24px; font-weight: bold;"></div>
                </div>
                <button class="btn btn-primary" id="registerBtn" style="width:100%;">Зарегистрироваться</button>
                <button class="btn btn-secondary" id="backToLoginBtn" style="width:100%; margin-top:10px;">Назад</button>
                <div id="regMsg" class="text-center mt-2"></div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="mainPanel" class="hidden">
        <div class="header">
            <div class="logo">🔷 SWILTS</div>
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div><div class="user-name" id="userName"></div><div class="user-tag" id="userTag"></div></div>
            </div>
            <div>
                <button class="btn btn-secondary" id="themeDarkBtn">🌙</button>
                <button class="btn btn-secondary" id="themeLightBtn">☀️</button>
                <button class="btn btn-danger" id="logoutBtn">🚪</button>
            </div>
        </div>

        <div class="main-grid">
            <!-- ДРУЗЬЯ -->
            <div class="friends-panel">
                <div class="panel-header">👥 Друзья</div>
                <div class="search-friends">
                    <input type="text" id="searchFriendsInput" placeholder="Поиск друзей...">
                </div>
                <div class="friends-list" id="friendsList">
                    <div class="text-muted text-center" style="padding:20px;">Загрузка...</div>
                </div>
            </div>

            <!-- ЧАТ -->
            <div class="chat-panel">
                <div class="chat-header" id="chatHeader">Выберите друга</div>
                <div class="messages" id="messages">
                    <div class="text-muted text-center" style="margin-top:40px;">👈 Нажмите на друга</div>
                </div>
                <div class="input-area" id="inputArea" style="display:none;">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button class="btn btn-primary" id="sendBtn">Отправить</button>
                </div>
            </div>

            <!-- ПРОФИЛЬ -->
            <div class="profile-panel">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <div class="profile-name" id="profileName"></div>
                <div class="profile-bio" id="profileBio"></div>

                <div class="setting-btn" id="editProfileBtn">🎨 Редактировать профиль</div>
                <div class="setting-btn" id="changePassBtn">🔐 Сменить пароль</div>

                <div style="margin: 16px 0 8px 0; font-weight: 500;">➕ Добавить друга</div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="searchUserInput" placeholder="Никнейм (например prisanok)">
                    <button class="btn btn-primary" id="searchUserBtn">Найти</button>
                </div>
                <div id="searchResults" class="mt-2"></div>

                <div id="requestsContainer" class="mt-3"></div>

                <div id="adminPanel" class="hidden" style="margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border);">
                    <div class="setting-btn" id="trollBtn" style="background: var(--danger);">🎭 ТРОЛЬ</div>
                    <input type="text" id="trollName" placeholder="Никнейм" class="mt-2">
                    <div class="setting-btn" id="allUsersBtn">👥 Все пользователи</div>
                    <div id="usersList" class="hidden mt-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let currentUser = null;
let currentFriendId = null;
let socket = null;

// ============ ТЕМА ============
function setTheme(theme) {
    if (theme === 'light') {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        localStorage.setItem('theme', 'light');
    } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
    }
}
setTheme(localStorage.getItem('theme') || 'dark');
document.getElementById('themeDarkBtn').onclick = () => setTheme('dark');
document.getElementById('themeLightBtn').onclick = () => setTheme('light');

// ============ КАПЧА (СЛУЧАЙНОЕ ЧИСЛО) ============
let currentCaptcha = 0;
function generateCaptcha() {
    currentCaptcha = Math.floor(Math.random() * 100) + 1;
    document.getElementById('captchaQuestion').innerHTML = currentCaptcha;
}
generateCaptcha();

// ============ WEBSOCKET ============
function initSocket() {
    socket = io();
    socket.on('connect', () => { if (currentUser) socket.emit('register', currentUser.id); });
    socket.on('private-message', (data) => {
        if (currentFriendId === data.from) {
            appendMessage(data.msg, false, data.time, data.fromName);
        } else {
            showNotification(data.fromName, data.msg);
        }
        loadFriends();
    });
}

function appendMessage(msg, isOwn, time, username) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
    if (!isOwn && username) {
        div.innerHTML = `<strong>${escapeHtml(username)}</strong>${escapeHtml(msg)}<div class="message-time">${new Date(time).toLocaleTimeString()}</div>`;
    } else {
        div.innerHTML = `${escapeHtml(msg)}<div class="message-time">${new Date(time).toLocaleTimeString()}</div>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showNotification(sender, msg) {
    const notif = document.createElement('div');
    notif.style.position = 'fixed';
    notif.style.bottom = '20px';
    notif.style.right = '20px';
    notif.style.background = 'var(--accent)';
    notif.style.color = 'white';
    notif.style.padding = '12px 20px';
    notif.style.borderRadius = '12px';
    notif.style.zIndex = '1000';
    notif.innerHTML = `<strong>📩 ${sender}</strong><br>${msg.substring(0, 50)}`;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

// ============ ЧАТ ============
async function selectFriend(friendId, friendName, friendTag) {
    currentFriendId = friendId;
    document.getElementById('chatHeader').innerHTML = `💬 ${friendName}#${friendTag}`;
    document.getElementById('inputArea').style.display = 'flex';
    await loadMessages();
}

async function loadMessages() {
    if (!currentFriendId) return;
    const res = await fetch('/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ u1: currentUser.id, u2: currentFriendId })
    });
    const data = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    if (data.messages) {
        data.messages.forEach(m => {
            const isOwn = m.from_user_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
            if (!isOwn) {
                div.innerHTML = `<strong>${m.from_username || 'Собеседник'}</strong>${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
            } else {
                div.innerHTML = `${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
            }
            container.appendChild(div);
        });
    }
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    const msg = document.getElementById('messageInput').value;
    if (!msg || !currentFriendId) return;
    appendMessage(msg, true, new Date());
    socket.emit('private-message', { from: currentUser.id, to: currentFriendId, msg, fromName: currentUser.username });
    await fetch('/send-message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from_user_id: currentUser.id, to_user_id: currentFriendId, message: msg })
    });
    document.getElementById('messageInput').value = '';
}

document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('messageInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});

// ============ ДРУЗЬЯ ============
async function loadFriends() {
    const res = await fetch('/friends', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });
    const data = await res.json();
    const container = document.getElementById('friendsList');
    container.innerHTML = '';
    if (data.friends && data.friends.length > 0) {
        data.friends.forEach(f => {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.onclick = () => selectFriend(f.id, f.username, f.tag);
            div.innerHTML = `<div class="friend-avatar">${f.avatar ? `<img src="${f.avatar}">` : f.username[0]}</div>
                            <div><div class="friend-name">${f.username}</div><div class="friend-tag">#${f.tag}</div></div>`;
            container.appendChild(div);
        });
    } else {
        container.innerHTML = '<div class="text-muted text-center" style="padding:20px;">У вас пока нет друзей</div>';
    }
}

async function loadRequests() {
    const res = await fetch('/requests', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });
    const data = await res.json();
    const container = document.getElementById('requestsContainer');
    container.innerHTML = '';
    if (data.requests && data.requests.length > 0) {
        container.innerHTML = '<div style="font-weight: 500; margin-bottom: 8px;">📨 Входящие запросы</div>';
        data.requests.forEach(req => {
            const div = document.createElement('div');
            div.className = 'request-item';
            div.innerHTML = `<span>👤 ${req.username}#${req.tag}</span>
                            <div>
                                <button class="btn btn-success" style="padding:4px 8px;" onclick="acceptRequest(${req.id}, ${req.user_id})">✅</button>
                                <button class="btn btn-danger" style="padding:4px 8px;" onclick="declineRequest(${req.id})">❌</button>
                            </div>`;
            container.appendChild(div);
        });
    }
}

async function acceptRequest(reqId, fromId) {
    await fetch('/friend/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: reqId, from: fromId, to: currentUser.id })
    });
    loadFriends();
    loadRequests();
}

async function declineRequest(reqId) {
    await fetch('/friend/decline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: reqId })
    });
    loadFriends();
    loadRequests();
}

// ============ ПОИСК ПО НИКУ ============
document.getElementById('searchUserBtn').onclick = async () => {
    const query = document.getElementById('searchUserInput').value;
    if (!query) return;
    const res = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: query })
    });
    const data = await res.json();
    const container = document.getElementById('searchResults');
    if (data.isDiscord) {
        window.open(`https://discord.com/users/${data.id}`, '_blank');
        alert('🔷 Переход в Discord');
        return;
    }
    container.innerHTML = '';
    if (data.users && data.users.length > 0) {
        data.users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'search-result-item';
            div.innerHTML = `<span>${u.username}#${u.tag}</span>
                            <button class="btn btn-success" style="padding:4px 8px;" onclick="addFriend(${u.id})">➕</button>`;
            container.appendChild(div);
        });
    } else {
        container.innerHTML = '<div class="error">❌ Пользователь не найден</div>';
    }
};

async function addFriend(userId) {
    if (userId === currentUser.id) {
        alert('Нельзя добавить себя');
        return;
    }
    const res = await fetch('/friend/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: currentUser.id, to: userId })
    });
    const data = await res.json();
    if (data.success) {
        document.getElementById('searchResults').innerHTML = '<div class="success">✅ Запрос отправлен</div>';
        loadRequests();
    } else {
        alert('❌ ' + data.error);
    }
}

// Фильтр друзей
document.getElementById('searchFriendsInput').addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase();
    const items = document.querySelectorAll('.friend-item');
    items.forEach(item => {
        const name = item.querySelector('.friend-name')?.innerText.toLowerCase() || '';
        item.style.display = name.includes(query) ? 'flex' : 'none';
    });
});

// ============ ПРОФИЛЬ ============
async function updateProfileDisplay() {
    document.getElementById('userName').innerText = currentUser.username;
    document.getElementById('userTag').innerText = '#' + currentUser.tag;
    document.getElementById('profileName').innerText = currentUser.username + '#' + currentUser.tag;
    const av = currentUser.avatar;
    if (av && av !== '') {
        document.getElementById('userAvatar').innerHTML = `<img src="${av}">`;
        document.getElementById('profileAvatar').innerHTML = `<img src="${av}">`;
    }
    if (currentUser.bio) document.getElementById('profileBio').innerText = currentUser.bio;
}

function openEditProfile() {
    const modal = document.createElement('div');
    modal.style.position = 'fixed';
    modal.style.top = '0';
    modal.style.left = '0';
    modal.style.right = '0';
    modal.style.bottom = '0';
    modal.style.background = 'rgba(0,0,0,0.8)';
    modal.style.backdropFilter = 'blur(8px)';
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    modal.style.zIndex = '2000';
    modal.innerHTML = `
        <div style="background: var(--card); border-radius: 24px; padding: 24px; width: 90%; max-width: 400px;">
            <h3 style="margin-bottom: 20px;">🎨 Редактировать профиль</h3>
            <input type="text" id="editAvatar" placeholder="Ссылка на аватар" value="${currentUser.avatar || ''}" style="margin-bottom: 12px;">
            <textarea id="editBio" rows="3" placeholder="О себе" style="margin-bottom: 12px;">${currentUser.bio || ''}</textarea>
            <button id="saveProfile" class="btn btn-primary" style="margin-right: 10px;">💾 Сохранить</button>
            <button id="closeModal" class="btn btn-secondary">Закрыть</button>
            <div id="editMsg" class="mt-2"></div>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('saveProfile').onclick = async () => {
        const avatar = document.getElementById('editAvatar').value;
        const bio = document.getElementById('editBio').value;
        await fetch('/update-profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ avatar, bio })
        });
        if (avatar) currentUser.avatar = avatar;
        if (bio) currentUser.bio = bio;
        updateProfileDisplay();
        document.getElementById('editMsg').innerHTML = '<span class="success">✅ Сохранено</span>';
        setTimeout(() => modal.remove(), 1500);
    };
    document.getElementById('closeModal').onclick = () => modal.remove();
}

function openChangePassword() {
    const modal = document.createElement('div');
    modal.style.position = 'fixed';
    modal.style.top = '0';
    modal.style.left = '0';
    modal.style.right = '0';
    modal.style.bottom = '0';
    modal.style.background = 'rgba(0,0,0,0.8)';
    modal.style.backdropFilter = 'blur(8px)';
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    modal.style.zIndex = '2000';
    modal.innerHTML = `
        <div style="background: var(--card); border-radius: 24px; padding: 24px; width: 90%; max-width: 400px;">
            <h3 style="margin-bottom: 20px;">🔐 Смена пароля</h3>
            <input type="password" id="oldPass" placeholder="Старый пароль" style="margin-bottom: 12px;">
            <input type="password" id="newPass" placeholder="Новый пароль" style="margin-bottom: 12px;">
            <input type="password" id="confirmPass" placeholder="Подтвердите" style="margin-bottom: 12px;">
            <button id="savePass" class="btn btn-primary" style="margin-right: 10px;">Сменить</button>
            <button id="closePassModal" class="btn btn-secondary">Закрыть</button>
            <div id="passMsg" class="mt-2"></div>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('savePass').onclick = async () => {
        const oldPass = document.getElementById('oldPass').value;
        const newPass = document.getElementById('newPass').value;
        const confirmPass = document.getElementById('confirmPass').value;
        if (newPass !== confirmPass) {
            document.getElementById('passMsg').innerHTML = '<span class="error">❌ Пароли не совпадают</span>';
            return;
        }
        const res = await fetch('/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('passMsg').innerHTML = '<span class="success">✅ Пароль изменён</span>';
            setTimeout(() => modal.remove(), 1500);
        } else {
            document.getElementById('passMsg').innerHTML = '<span class="error">❌ ' + data.error + '</span>';
        }
    };
    document.getElementById('closePassModal').onclick = () => modal.remove();
}

document.getElementById('editProfileBtn').onclick = openEditProfile;
document.getElementById('changePassBtn').onclick = openChangePassword;

// ============ АДМИН ============
async function loadAdmin() {
    if (currentUser.username !== 'prisanok') return;
    document.getElementById('adminPanel').classList.remove('hidden');
}
async function loadAllUsers() {
    const res = await fetch('/all-users');
    const data = await res.json();
    const container = document.getElementById('usersList');
    container.innerHTML = '';
    if (data.users) {
        data.users.forEach(u => {
            const div = document.createElement('div');
            div.style.padding = '8px';
            div.style.margin = '6px 0';
            div.style.background = 'var(--input)';
            div.style.borderRadius = '10px';
            div.style.display = 'flex';
            div.style.justifyContent = 'space-between';
            div.style.alignItems = 'center';
            div.innerHTML = `<span>${u.username}#${u.tag} ${u.banned ? '(забанен)' : ''}</span>
                            <div>${u.banned ? `<button class="btn btn-success" style="padding:4px 8px;" onclick="unbanUser(${u.id})">Разбан</button>` : `<button class="btn btn-danger" style="padding:4px 8px;" onclick="banUser(${u.id})">Бан</button>`}</div>`;
            container.appendChild(div);
        });
    }
    container.classList.remove('hidden');
}
window.banUser = async (id) => {
    const reason = prompt('Причина бана:');
    if (!reason) return;
    await fetch('/ban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: id, reason }) });
    loadAllUsers();
};
window.unbanUser = async (id) => {
    await fetch('/unban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: id }) });
    loadAllUsers();
};
document.getElementById('allUsersBtn').onclick = () => {
    const list = document.getElementById('usersList');
    if (list.classList.contains('hidden')) loadAllUsers();
    else list.classList.add('hidden');
};
document.getElementById('trollBtn').onclick = async () => {
    const name = document.getElementById('trollName').value;
    if (!name) return;
    const res = await fetch('/troll', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: name, adminUsername: currentUser.username })
    });
    const data = await res.json();
    if (data.success) { currentUser = data.user; showMain(); }
    else alert('Ошибка');
};

// ============ АВТОРИЗАЦИЯ ============
async function checkSession() {
    const res = await fetch('/session');
    const data = await res.json();
    if (data.success && data.user) { currentUser = data.user; showMain(); }
}
async function login() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (data.success) { currentUser = data.user; showMain(); }
    else document.getElementById('authMsg').innerText = '❌ ' + data.error;
}
async function register() {
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const captcha = document.getElementById('regCaptcha').value;
    if (parseInt(captcha) !== currentCaptcha) {
        document.getElementById('regMsg').innerHTML = '<span class="error">❌ Неверная капча</span>';
        generateCaptcha();
        return;
    }
    const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, captcha, ip: 'auto' })
    });
    const data = await res.json();
    if (data.success) { currentUser = data.user; showMain(); }
    else document.getElementById('regMsg').innerHTML = '<span class="error">❌ ' + data.error + '</span>';
}
function showMain() {
    document.getElementById('authPanel').classList.add('hidden');
    document.getElementById('mainPanel').classList.remove('hidden');
    updateProfileDisplay();
    loadFriends();
    loadRequests();
    loadAdmin();
    initSocket();
}
document.getElementById('loginBtn').onclick = login;
document.getElementById('showRegisterBtn').onclick = () => { 
    document.getElementById('authForm').classList.add('hidden'); 
    document.getElementById('regForm').classList.remove('hidden'); 
    generateCaptcha();
};
document.getElementById('backToLoginBtn').onclick = () => { 
    document.getElementById('regForm').classList.add('hidden'); 
    document.getElementById('authForm').classList.remove('hidden'); 
};
document.getElementById('registerBtn').onclick = register;
document.getElementById('logoutBtn').onclick = async () => { await fetch('/logout', { method: 'POST' }); location.reload(); };

checkSession();

function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}
</script>
</body>
