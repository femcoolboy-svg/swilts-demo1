<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SWILTS — Мессенджер с серверами</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body.dark {
            --bg-primary: #0a0c10;
            --bg-secondary: #111214;
            --bg-card: #1a1b1e;
            --bg-hover: #232428;
            --bg-input: #1e1f22;
            --text-primary: #dbdee1;
            --text-secondary: #949ba4;
            --text-muted: #5d5f63;
            --border: #2b2d31;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --danger: #ed4245;
            --success: #23a55a;
            --plus: linear-gradient(135deg, #FFD700, #FFA500);
            --gradient: linear-gradient(135deg, #5865f2, #4752c4);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.4);
        }

        body.light {
            --bg-primary: #f2f3f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #eef2f5;
            --bg-input: #eef2f5;
            --text-primary: #2e3035;
            --text-secondary: #5c5e66;
            --text-muted: #949aa4;
            --border: #e3e5e8;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --danger: #ed4245;
            --success: #23a55a;
            --plus: linear-gradient(135deg, #FFD700, #FFA500);
            --gradient: linear-gradient(135deg, #5865f2, #4752c4);
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(88,101,242,0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        /* АНИМАЦИИ */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .animate-fade { animation: fadeIn 0.4s; }
        .animate-slide-left { animation: slideInLeft 0.3s; }
        .animate-slide-right { animation: slideInRight 0.3s; }

        /* ОСНОВНЫЕ КЛАССЫ */
        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            border: 1px solid var(--border);
        }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-family: inherit;
        }
        .btn-primary { background: var(--gradient); color: white; }
        .btn-primary:hover { transform: scale(1.02); filter: brightness(1.05); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #c03537; transform: scale(1.02); }
        .btn-success { background: var(--success); color: white; }
        .btn-secondary { background: var(--bg-hover); color: var(--text-primary); }
        .btn-plus { background: var(--plus); color: #1a1a2e; font-weight: bold; }
        .btn-secondary:hover, .btn-plus:hover { transform: scale(1.02); }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88,101,242,0.2);
        }

        /* ШАПКА */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--bg-card);
            border-radius: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .site-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #5865f2, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: float 3s infinite;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }
        .avatar:hover { transform: scale(1.05); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-details { display: flex; flex-direction: column; }
        .user-name { font-weight: 700; font-size: 18px; }
        .user-tag { font-size: 12px; color: var(--text-secondary); }
        .user-created { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

        .plus-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--plus);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid var(--bg-card);
        }

        .theme-buttons { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ПРИВЕТСТВИЕ */
        .greeting-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--gradient);
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            animation: slideInRight 0.4s;
        }

        /* ЛЕВАЯ ПАНЕЛЬ СЕРВЕРОВ */
        .main-layout {
            display: flex;
            gap: 20px;
        }

        .servers-sidebar {
            width: 72px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .server-icon:hover { border-radius: 16px; transform: scale(1.05); }
        .server-icon.active { border-radius: 16px; background: var(--gradient); box-shadow: 0 0 0 3px var(--accent); }
        .server-add { background: var(--bg-hover); font-size: 28px; }
        .server-add:hover { background: var(--accent); color: white; }

        .servers-divider {
            width: 32px;
            height: 2px;
            background: var(--border);
            margin: 4px 0;
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .content-area {
            flex: 1;
            display: flex;
            gap: 20px;
        }

        .channels-sidebar {
            width: 240px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .server-header {
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .server-name {
            font-weight: 700;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category {
            margin-top: 16px;
        }
        .category-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
            cursor: pointer;
        }
        .channel {
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .channel:hover { background: var(--bg-hover); }
        .channel.active { background: var(--bg-hover); color: var(--accent); }
        .channel-voice { color: var(--text-secondary); }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-primary);
        }

        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 22px;
            word-wrap: break-word;
            animation: slideInLeft 0.2s;
        }
        .message-own {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .message-other {
            align-self: flex-start;
            background: var(--bg-input);
            border-bottom-left-radius: 6px;
        }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
        }
        .input-area input { flex: 1; margin: 0; }

        .right-panel {
            width: 260px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid var(--border);
        }

        .member-list { margin-top: 16px; }
        .member {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
        }
        .member:hover { background: var(--bg-hover); }
        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            overflow: hidden;
        }
        .member-name { font-size: 14px; }
        .member-role { font-size: 10px; color: var(--text-secondary); }

        /* МОДАЛКИ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.2s;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border);
            animation: slideInLeft 0.3s;
        }
        .modal-content h3 { margin-bottom: 20px; font-size: 24px; }
        .modal-content input, .modal-content select { margin-bottom: 16px; }

        .hidden { display: none; }
        .error { color: var(--danger); }
        .success { color: var(--success); }
        .text-center { text-align: center; }
        .text-muted { color: var(--text-secondary); }
        .mt-2 { margin-top: 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex { display: flex; align-items: center; gap: 12px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-input); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="dark">
<div class="container">
    <!-- АВТОРИЗАЦИЯ -->
    <div id="authPanel">
        <div class="card" style="max-width: 460px; margin: 80px auto;">
            <h1 style="text-align:center; margin-bottom:32px; font-size:44px; background:linear-gradient(135deg,#5865f2,#764ba2); -webkit-background-clip:text; background-clip:text; color:transparent;">🔷 SWILTS</h1>
            <div id="authForm">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button class="btn btn-primary" id="loginBtn" style="width:100%;">🔑 Войти</button>
                <button class="btn btn-secondary" id="showRegisterBtn" style="width:100%; margin-top:12px;">📝 Создать аккаунт</button>
                <div id="authMsg" class="error text-center mt-2"></div>
            </div>
            <div id="regForm" class="hidden">
                <input type="text" id="regUsername" placeholder="Никнейм">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль">
                <input type="text" id="regCaptcha" placeholder="Капча">
                <div id="captchaQuestion" class="text-muted text-center mt-2 mb-2"></div>
                <button class="btn btn-primary" id="registerBtn" style="width:100%;">✅ Зарегистрироваться</button>
                <button class="btn btn-secondary" id="backToLoginBtn" style="width:100%; margin-top:12px;">← Назад</button>
                <div id="regMsg" class="text-center mt-2"></div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="mainPanel" class="hidden">
        <div class="header">
            <div class="site-title"><span>🔷</span><span>SWILTS</span></div>
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="userName"></div>
                    <div class="user-tag" id="userTag"></div>
                    <div class="user-created" id="userCreated"></div>
                </div>
                <div id="plusBadge" class="plus-badge hidden">💎</div>
            </div>
            <div class="theme-buttons">
                <button class="btn btn-secondary" id="themeDarkBtn">🌙</button>
                <button class="btn btn-secondary" id="themeLightBtn">☀️</button>
                <button class="btn btn-danger" id="logoutBtn">🚪</button>
                <button class="btn btn-plus" id="plusBtn">💎</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- ЛЕВАЯ ПАНЕЛЬ СЕРВЕРОВ -->
            <div class="servers-sidebar" id="serversSidebar">
                <div class="server-icon server-add" id="createServerBtn">+</div>
                <div class="servers-divider"></div>
                <div id="serversList"></div>
            </div>

            <!-- КАНАЛЫ СЕРВЕРА -->
            <div class="channels-sidebar" id="channelsSidebar">
                <div class="server-header">
                    <div class="server-name">
                        <span id="currentServerName">Выберите сервер</span>
                        <span id="serverMenuBtn" style="cursor:pointer;">⚙️</span>
                    </div>
                </div>
                <div id="channelsList"></div>
                <div id="membersList" class="member-list" style="margin-top:20px;">
                    <div class="category-title">УЧАСТНИКИ</div>
                    <div id="serverMembers"></div>
                </div>
            </div>

            <!-- ЧАТ -->
            <div class="chat-area">
                <div class="chat-header">
                    <div id="currentChannelName"># Выберите канал</div>
                </div>
                <div id="messages" class="messages"><div class="text-center text-muted" style="margin-top:40px;">👈 Выберите канал</div></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button class="btn btn-primary" id="sendMsgBtn">📤</button>
                </div>
            </div>

            <!-- ПРАВАЯ ПАНЕЛЬ (ПРОФИЛЬ/ДРУЗЬЯ) -->
            <div class="right-panel">
                <div class="profile-banner" id="profileBanner" style="height:80px; background:var(--gradient); border-radius:16px; margin-bottom:-30px;"></div>
                <div class="text-center">
                    <div class="avatar" id="profileAvatar" style="width:64px; height:64px; margin:0 auto; border:3px solid var(--bg-card);">👤</div>
                    <div class="profile-name" id="profileName" style="margin-top:8px;"></div>
                    <div class="profile-bio" id="profileBio" class="text-muted" style="font-size:12px;"></div>
                </div>
                <div class="stats" style="display:flex; justify-content:space-around; margin:16px 0;">
                    <div class="text-center"><div id="friendsCount">0</div><div class="text-muted" style="font-size:10px;">друзей</div></div>
                    <div class="text-center"><div id="requestsCount">0</div><div class="text-muted" style="font-size:10px;">запросов</div></div>
                </div>
                <div class="menu-item" id="editAvatarBtn" style="padding:10px; background:var(--bg-input); border-radius:12px; margin-bottom:8px; text-align:center; cursor:pointer;">📷 Аватар</div>
                <div class="menu-item" id="changeUsernameBtn" style="padding:10px; background:var(--bg-input); border-radius:12px; margin-bottom:8px; text-align:center; cursor:pointer;">✏️ Сменить ник</div>
                <div class="menu-item" id="editStatusBtn" style="padding:10px; background:var(--bg-input); border-radius:12px; margin-bottom:8px; text-align:center; cursor:pointer;">🟢 Статус</div>
                <div class="menu-item" id="friendsBtn" style="padding:10px; background:var(--bg-input); border-radius:12px; text-align:center; cursor:pointer;">👥 Друзья</div>
                <div id="adminPanel" class="hidden" style="margin-top:16px;">
                    <div class="menu-item" id="trollBtn" style="background:var(--danger);">🎭 ТРОЛЬ</div>
                    <input type="text" id="trollName" placeholder="Никнейм" class="mt-2">
                    <div class="menu-item" id="allUsersBtn" style="margin-top:8px;">👥 Все пользователи</div>
                    <div id="usersList" class="hidden" style="margin-top:8px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let currentUser = null;
let currentServerId = null;
let currentChannelId = null;
let socket = null;

let userIP = '';
fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>userIP=d.ip);

// КАПЧА
async function loadCaptcha() {
    const res = await fetch('/captcha');
    const data = await res.json();
    document.getElementById('captchaQuestion').innerHTML = `Введите число: ${data.captcha}`;
}
loadCaptcha();

// ТЕМА
function setTheme(theme) {
    if (theme === 'light') {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        localStorage.setItem('theme', 'light');
    } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
    }
}
setTheme(localStorage.getItem('theme') || 'dark');
document.getElementById('themeDarkBtn').onclick = () => setTheme('dark');
document.getElementById('themeLightBtn').onclick = () => setTheme('light');

// WEBSOCKET
function initSocket() {
    socket = io();
    socket.on('connect', () => { if (currentUser) socket.emit('register', currentUser.id); });
    
    socket.on('server-message', (data) => {
        if (currentChannelId === data.channelId) {
            appendMessage(data.message, false, data.time, data.username);
        }
    });
    
    socket.on('private-message', (data) => {
        showNotification(data.fromName, data.msg);
        loadFriends();
    });
}

function appendMessage(msg, isOwn, time, username) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
    if (!isOwn && username) div.innerHTML = `<strong>${username}</strong><br>${escapeHtml(msg)}<div class="message-time">${new Date(time).toLocaleTimeString()}</div>`;
    else div.innerHTML = `${escapeHtml(msg)}<div class="message-time">${new Date(time).toLocaleTimeString()}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function showNotification(sender, msg) {
    const notif = document.createElement('div');
    notif.className = 'greeting-toast';
    notif.style.background = 'var(--accent)';
    notif.style.bottom = '100px';
    notif.innerHTML = `<strong>📩 ${sender}</strong><br>${msg.substring(0, 50)}`;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}

// ============ СЕРВЕРА ============
async function loadServers() {
    const res = await fetch('/servers');
    const data = await res.json();
    const container = document.getElementById('serversList');
    container.innerHTML = '';
    data.servers.forEach(s => {
        const div = document.createElement('div');
        div.className = `server-icon ${currentServerId === s.id ? 'active' : ''}`;
        div.innerHTML = s.icon || '🏠';
        div.onclick = () => selectServer(s.id);
        container.appendChild(div);
    });
}

async function selectServer(serverId) {
    currentServerId = serverId;
    const res = await fetch(`/server/${serverId}`);
    const data = await res.json();
    if (data.success) {
        document.getElementById('currentServerName').innerText = data.server.name;
        document.getElementById('currentChannelName').innerText = '# Выберите канал';
        
        // Каналы
        const channelsContainer = document.getElementById('channelsList');
        channelsContainer.innerHTML = '';
        data.categories.forEach(cat => {
            const catDiv = document.createElement('div');
            catDiv.className = 'category';
            catDiv.innerHTML = `<div class="category-title">📁 ${cat.name}</div>`;
            const catChannels = data.channels.filter(ch => ch.category_id === cat.id);
            catChannels.forEach(ch => {
                const chDiv = document.createElement('div');
                chDiv.className = `channel ${ch.type === 'voice' ? 'channel-voice' : ''}`;
                chDiv.innerHTML = `${ch.type === 'voice' ? '🔊' : '#'} ${ch.name}`;
                chDiv.onclick = () => selectChannel(ch.id);
                catDiv.appendChild(chDiv);
            });
            channelsContainer.appendChild(catDiv);
        });
        
        // Участники
        const membersContainer = document.getElementById('serverMembers');
        membersContainer.innerHTML = '';
        data.members.forEach(m => {
            const div = document.createElement('div');
            div.className = 'member';
            div.innerHTML = `<div class="member-avatar">${m.avatar ? `<img src="${m.avatar}">` : m.username[0]}</div>
                            <div><div class="member-name">${m.username}</div><div class="member-role">${m.role === 'owner' ? 'Владелец' : (m.role === 'admin' ? 'Админ' : 'Участник')}</div></div>`;
            membersContainer.appendChild(div);
        });
        
        loadServers();
    }
}

async function selectChannel(channelId) {
    currentChannelId = channelId;
    document.getElementById('currentChannelName').innerHTML = `# Канал`;
    const res = await fetch(`/server/messages/${channelId}`);
    const data = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    data.messages.forEach(m => {
        const isOwn = m.user_id === currentUser.id;
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
        if (!isOwn) div.innerHTML = `<strong>${m.username}</strong><br>${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
        else div.innerHTML = `${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
        container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
}

async function sendServerMessage() {
    const msg = document.getElementById('messageInput').value;
    if (!msg || !currentChannelId) return;
    await fetch('/server/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channelId: currentChannelId, message: msg })
    });
    document.getElementById('messageInput').value = '';
    // Сообщение добавится через WebSocket
}

document.getElementById('createServerBtn').onclick = async () => {
    const name = prompt('Название сервера:');
    if (!name) return;
    const res = await fetch('/server/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    });
    const data = await res.json();
    if (data.success) {
        loadServers();
        selectServer(data.serverId);
    }
};

// ============ ПРОФИЛЬ ============
async function updateProfileDisplay() {
    document.getElementById('userName').innerText = currentUser.username;
    document.getElementById('userTag').innerText = '#' + currentUser.tag;
    document.getElementById('profileName').innerText = currentUser.username + '#' + currentUser.tag;
    if (currentUser.created_at) document.getElementById('userCreated').innerHTML = `📅 ${new Date(currentUser.created_at).toLocaleDateString()}`;
    
    if (currentUser.hasPlus) document.getElementById('plusBadge').classList.remove('hidden');
    if (currentUser.plus_color) document.documentElement.style.setProperty('--user-color', currentUser.plus_color);
    
    const av = currentUser.plus_animated_avatar || currentUser.avatar;
    if (av) {
        document.getElementById('userAvatar').innerHTML = `<img src="${av}">`;
        document.getElementById('profileAvatar').innerHTML = `<img src="${av}">`;
    }
    if (currentUser.bio) document.getElementById('profileBio').innerText = currentUser.bio;
}

function uploadFile(url) {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = async (e) => {
        const fd = new FormData();
        fd.append('file', e.target.files[0]);
        const res = await fetch(url, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) location.reload();
        else alert(data.error || 'Ошибка');
    };
    input.click();
}

document.getElementById('editAvatarBtn').onclick = () => uploadFile('/avatar');
document.getElementById('changeUsernameBtn').onclick = async () => {
    const newName = prompt('Новый ник (3-20 символов):');
    if (!newName) return;
    const res = await fetch('/change-username', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ newUsername: newName })
    });
    const data = await res.json();
    if (data.success) location.reload();
    else alert(data.error);
};
document.getElementById('editStatusBtn').onclick = async () => {
    const s = prompt('Статус:\n1-В сети\n2-Не активен\n3-Не беспокоить', '1');
    let st = 'online';
    if (s === '2') st = 'idle';
    if (s === '3') st = 'dnd';
    await fetch('/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: st, bio: currentUser.bio })
    });
    location.reload();
};

async function loadAdmin() {
    if (currentUser.username !== 'prisanok') return;
    document.getElementById('adminPanel').classList.remove('hidden');
}
async function loadAllUsers() {
    const res = await fetch('/all-users');
    const data = await res.json();
    const container = document.getElementById('usersList');
    container.innerHTML = '';
    data.users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'friend-item';
        div.style.padding = '8px';
        div.style.margin = '4px 0';
        div.style.background = 'var(--bg-input)';
        div.style.borderRadius = '10px';
        div.innerHTML = `<span>${u.username}#${u.tag} ${u.banned ? '(забанен)' : ''}</span>
                        <div>${u.banned ? `<button class="btn btn-success" onclick="unban(${u.id})">Разбан</button>` : `<button class="btn btn-danger" onclick="ban(${u.id})">Бан</button>`}</div>`;
        container.appendChild(div);
    });
    container.classList.remove('hidden');
}
window.ban = async (id) => {
    const reason = prompt('Причина бана:');
    if (!reason) return;
    await fetch('/ban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: id, reason }) });
    loadAllUsers();
};
window.unban = async (id) => {
    await fetch('/unban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: id }) });
    loadAllUsers();
};
document.getElementById('allUsersBtn').onclick = () => {
    const list = document.getElementById('usersList');
    if (list.classList.contains('hidden')) loadAllUsers();
    else list.classList.add('hidden');
};

};

// ============ АВТОРИЗАЦИЯ ============
async function checkSession() {
    const res = await fetch('/session');
    const data = await res.json();
    if (data.success && data.user) { currentUser = data.user; showMain(); }
}
async function login() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (data.success) { currentUser = data.user; showMain(); }
    else document.getElementById('authMsg').innerText = '❌ ' + data.error;
}
async function register() {
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const captcha = document.getElementById('regCaptcha').value;
    const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password, captcha, ip: userIP }) });
    const data = await res.json();
    if (data.success) { currentUser = data.user; showMain(); }
    else document.getElementById('regMsg').innerHTML = '<span class="error">❌ ' + data.error + '</span>';
}
function showMain() {
    document.getElementById('authPanel').classList.add('hidden');
    document.getElementById('mainPanel').classList.remove('hidden');
    updateProfileDisplay();
    loadFriends();
    loadRequests();
    loadServers();
    loadAdmin();
    initSocket();
    
    // Приветствие
    const hours = new Date().getHours();
    let greeting = hours >= 7 && hours <= 10 ? 'Доброе утро' : (hours >= 11 && hours <= 23 ? 'Добрый день' : 'Доброй ночи');
    const toast = document.createElement('div');
    toast.className = 'greeting-toast';
    toast.innerHTML = `<span>${greeting},</span><span>${currentUser.username}#${currentUser.tag}</span>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
document.getElementById('loginBtn').onclick = login;
document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('authForm').classList.add('hidden'); document.getElementById('regForm').classList.remove('hidden'); loadCaptcha(); };
document.getElementById('backToLoginBtn').onclick = () => { document.getElementById('regForm').classList.add('hidden'); document.getElementById('authForm').classList.remove('hidden'); };
document.getElementById('registerBtn').onclick = register;
document.getElementById('logoutBtn').onclick = async () => { await fetch('/logout', { method: 'POST' }); location.reload(); };
document.getElementById('sendMsgBtn').onclick = sendServerMessage;
document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendServerMessage(); });
document.getElementById('plusBtn').onclick = () => window.open('/plus.html', '_blank');
document.getElementById('friendsBtn').onclick = () => alert('Список друзей и заявок будет в следующем обновлении');

checkSession();

function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
}
