<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SWILTS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0c10;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .auth, .chat {
            background: #1a1b1e;
            border-radius: 20px;
            padding: 30px;
            margin-top: 50px;
        }
        input, button {
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
        }
        input {
            background: #2b2d31;
            color: white;
            width: 100%;
        }
        button {
            background: #5865f2;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .users-list, .messages-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .user-item, .message-item {
            background: #2b2d31;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
        }
        .flex {
            display: flex;
            gap: 20px;
        }
        .sidebar {
            width: 300px;
        }
        .main {
            flex: 1;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #5865f2;
            display: inline-block;
            margin-right: 10px;
            background-size: cover;
        }
        .hidden {
            display: none;
        }
        .right {
            width: 300px;
            text-align: center;
        }
        .big-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: #5865f2;
            background-size: cover;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- АВТОРИЗАЦИЯ -->
    <div id="authBlock">
        <div class="auth">
            <h1>🔷 SWILTS</h1>
            <input type="text" id="loginUsername" placeholder="Никнейм">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <button id="showRegBtn">Регистрация</button>
            <div id="authError" style="color: red;"></div>
        </div>
        <div class="auth hidden" id="regBlock">
            <h1>📝 Регистрация</h1>
            <input type="text" id="regUsername" placeholder="Никнейм">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button id="regBtn">Зарегистрироваться</button>
            <button id="backToLoginBtn">Назад</button>
            <div id="regError" style="color: red;"></div>
        </div>
    </div>

    <!-- ЧАТ -->
    <div id="chatBlock" class="hidden">
        <div class="flex">
            <div class="sidebar">
                <h3>👥 Пользователи</h3>
                <div class="users-list" id="usersList"></div>
            </div>
            <div class="main">
                <div id="chatHeader"><h3>💬 Чат</h3></div>
                <div class="messages-list" id="messagesList"></div>
                <div class="flex" style="margin-top: 10px;">
                    <input type="text" id="messageInput" placeholder="Сообщение..." style="flex:1">
                    <button id="sendBtn">Отправить</button>
                </div>
            </div>
            <div class="right">
                <div class="big-avatar" id="profileAvatar"></div>
                <h3 id="profileName"></h3>
                <button id="changeAvatarBtn">📷 Сменить аватар</button>
                <input type="file" id="avatarFile" style="display:none">
                <button id="logoutBtn" style="margin-top:20px;background:#ed4245;">Выйти</button>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let currentUser = null;
let currentChatWith = null;
let socket = null;

// Элементы
const authBlock = document.getElementById('authBlock');
const chatBlock = document.getElementById('chatBlock');
const loginBtn = document.getElementById('loginBtn');
const regBtn = document.getElementById('regBtn');
const showRegBtn = document.getElementById('showRegBtn');
const backToLoginBtn = document.getElementById('backToLoginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const usersList = document.getElementById('usersList');
const messagesList = document.getElementById('messagesList');
const sendBtn = document.getElementById('sendBtn');
const messageInput = document.getElementById('messageInput');
const profileName = document.getElementById('profileName');
const profileAvatar = document.getElementById('profileAvatar');
const changeAvatarBtn = document.getElementById('changeAvatarBtn');
const avatarFile = document.getElementById('avatarFile');

// Проверка сессии
fetch('/me').then(res => res.json()).then(user => {
    if (user && !user.error) {
        currentUser = user;
        startChat();
    }
});

// Регистрация
regBtn.onclick = async () => {
    const username = document.getElementById('regUsername').value;
    const password = document.getElementById('regPassword').value;
    const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.error) {
        document.getElementById('regError').innerText = data.error;
    } else {
        currentUser = { id: data.userId, username: data.username };
        startChat();
    }
};

// Логин
loginBtn.onclick = async () => {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.error) {
        document.getElementById('authError').innerText = data.error;
    } else {
        currentUser = { id: data.userId, username: data.username };
        startChat();
    }
};

showRegBtn.onclick = () => {
    document.querySelector('.auth').classList.add('hidden');
    document.getElementById('regBlock').classList.remove('hidden');
};
backToLoginBtn.onclick = () => {
    document.getElementById('regBlock').classList.add('hidden');
    document.querySelector('.auth').classList.remove('hidden');
};

logoutBtn.onclick = async () => {
    await fetch('/logout', { method: 'POST' });
    location.reload();
};

async function startChat() {
    authBlock.classList.add('hidden');
    chatBlock.classList.remove('hidden');
    profileName.innerText = currentUser.username;
    if (currentUser.avatar) profileAvatar.style.backgroundImage = `url(${currentUser.avatar})`;
    
    // Загрузить пользователей
    const res = await fetch('/users', { method: 'POST' });
    const users = await res.json();
    usersList.innerHTML = '';
    users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `<div style="display:flex;align-items:center;">
            <div class="avatar" style="background-image:url(${u.avatar || ''})"></div>
            ${u.username}
        </div>`;
        div.onclick = () => {
            currentChatWith = u.id;
            loadMessages(u.id);
        };
        usersList.appendChild(div);
    });
    
    // Socket
    socket = io();
    socket.emit('register', currentUser.id);
    socket.on('new_message', (data) => {
        if (data.from === currentChatWith) {
            appendMessage(data.message, false);
        }
    });
    
    changeAvatarBtn.onclick = () => avatarFile.click();
    avatarFile.onchange = async (e) => {
        const file = e.target.files[0];
        const fd = new FormData();
        fd.append('avatar', file);
        const res = await fetch('/avatar', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.url) {
            currentUser.avatar = data.url;
            profileAvatar.style.backgroundImage = `url(${data.url})`;
        }
    };
    
    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
}

async function loadMessages(withUser) {
    const res = await fetch('/messages/get', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ with: withUser })
    });
    const messages = await res.json();
    messagesList.innerHTML = '';
    messages.forEach(m => {
        appendMessage(m.message, m.from_user === currentUser.id);
    });
}

function appendMessage(text, isOwn) {
    const div = document.createElement('div');
    div.className = 'message-item';
    div.style.textAlign = isOwn ? 'right' : 'left';
    div.style.background = isOwn ? '#5865f2' : '#2b2d31';
    div.innerText = text;
    messagesList.appendChild(div);
    messagesList.scrollTop = messagesList.scrollHeight;
}

async function sendMessage() {
    const text = messageInput.value;
    if (!text || !currentChatWith) return;
    await fetch('/messages/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: currentChatWith, message: text })
    });
    appendMessage(text, true);
    messageInput.value = '';
}
</script>
</body>
</html>
