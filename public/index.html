<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILTS — Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body.dark {
            --bg: #0a0e1a;
            --card: #0f1729;
            --hover: #1e293b;
            --input: #0a0f1c;
            --text: #e2e8f0;
            --text-sec: #94a3b8;
            --border: #1e293b;
            --accent: #818cf8;
            --danger: #f87171;
            --success: #34d399;
            --gradient: linear-gradient(135deg, #818cf8, #a78bfa);
            --plus: linear-gradient(135deg, #fbbf24, #f59e0b);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body.light {
            --bg: #f8fafc;
            --card: #ffffff;
            --hover: #f1f5f9;
            --input: #f1f5f9;
            --text: #1e293b;
            --text-sec: #475569;
            --border: #e2e8f0;
            --accent: #818cf8;
            --danger: #f87171;
            --success: #34d399;
            --gradient: linear-gradient(135deg, #818cf8, #a78bfa);
            --plus: linear-gradient(135deg, #fbbf24, #f59e0b);
            --shadow: 0 8px 28px rgba(0, 0, 0, 0.06);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* АВТОРИЗАЦИЯ */
        .auth-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0a0e1a, #0f1729);
            z-index: 1000;
        }
        .auth-card {
            background: var(--card);
            border-radius: 32px;
            padding: 40px;
            width: 400px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .auth-card h1 { text-align: center; margin-bottom: 24px; font-size: 36px; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 24px; }
        .auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 30px; cursor: pointer; background: var(--input); }
        .auth-tab.active { background: var(--gradient); color: white; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-form input { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--input); border: 1px solid var(--border); border-radius: 12px; color: var(--text); }
        .auth-form button { width: 100%; padding: 12px; background: var(--gradient); border: none; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; }
        .captcha-block { display: flex; gap: 10px; margin-bottom: 12px; }
        .captcha-number { background: var(--input); padding: 12px; border-radius: 12px; font-size: 24px; font-weight: bold; }
        .error { color: var(--danger); text-align: center; margin-top: 8px; }
        .success { color: var(--success); }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--card);
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .user-area { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .grid {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
        }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary { background: var(--gradient); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: #1a1a2e; }
        .list-item {
            background: var(--input);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .friend-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; margin-right: 10px; overflow: hidden; }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .flex { display: flex; align-items: center; gap: 10px; }
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 500px;
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
        }
        .chat-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 70%;
            padding: 8px 14px;
            border-radius: 18px;
        }
        .message-own { align-self: flex-end; background: var(--accent); color: white; }
        .message-other { align-self: flex-start; background: var(--input); }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid var(--border);
        }
        .input-area input { flex: 1; padding: 10px; background: var(--input); border: none; border-radius: 24px; color: var(--text); }
        .profile-banner {
            width: 100%;
            height: 80px;
            border-radius: 16px;
            background: var(--gradient);
            margin-bottom: -30px;
            background-size: cover;
        }
        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--card);
            margin: 0 auto;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            overflow: hidden;
            position: relative;
        }
        .stats { display: flex; justify-content: space-around; margin: 16px 0; }
        .menu-item {
            background: var(--input);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            margin: 8px 0;
            cursor: pointer;
        }
        .hidden { display: none; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
    </style>
</head>
<body class="dark">
    <!-- АВТОРИЗАЦИЯ -->
    <div id="authPanel" class="auth-wrapper">
        <div class="auth-card">
            <h1>🔷 SWILTS</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">🔑 Вход</div>
                <div class="auth-tab" data-tab="register">📝 Регистрация</div>
            </div>
            <div id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="doLogin">Войти</button>
                <div id="loginMsg" class="error mt-2"></div>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Никнейм (3-20)">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6)">
                <div class="captcha-block">
                    <div class="captcha-number" id="captchaNum">0</div>
                    <input type="text" id="regCaptcha" placeholder="Введите число">
                </div>
                <button id="doRegister">Зарегистрироваться</button>
                <div id="regMsg" class="mt-2"></div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="mainPanel" class="hidden">
        <div class="app">
            <div class="header">
                <div class="user-area">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div><span id="userName"></span><span id="userTag"></span></div>
                </div>
                <div>
                    <button class="btn btn-primary" id="themeDarkBtn">🌙</button>
                    <button class="btn btn-primary" id="themeLightBtn">☀️</button>
                    <button class="btn btn-plus" id="plusBtn">💎 Plus</button>
                    <button class="btn btn-danger" id="logoutBtn">🚪</button>
                </div>
            </div>

            <div class="grid">
                <!-- ЛЕВАЯ КОЛОНКА -->
                <div class="card">
                    <div class="mb-2">🔍 ПОИСК</div>
                    <div class="flex">
                        <input type="text" id="searchInput" placeholder="Никнейм">
                        <button class="btn btn-primary" id="searchBtn">Найти</button>
                    </div>
                    <div id="searchResults" class="mt-2"></div>

                    <div class="mt-2 mb-2">📨 ЗАПРОСЫ</div>
                    <div id="requestsList"></div>

                    <div class="mt-2 mb-2">👥 ДРУЗЬЯ</div>
                    <div id="friendsList"></div>

                    <div id="adminPanel" class="hidden mt-2">
                        <div class="mb-2">👑 АДМИН</div>
                        <div class="menu-item" id="trollBtn">🎭 ТРОЛЛЬ</div>
                        <input type="text" id="trollName" placeholder="Никнейм" class="mt-2">
                        <div class="menu-item" id="banBtn">🔨 БАН</div>
                        <input type="text" id="banName" placeholder="Никнейм" class="mt-2">
                        <div class="menu-item" id="givePlusAdminBtn">💎 Выдать Plus (1 час)</div>
                        <input type="text" id="plusUserName" placeholder="Никнейм" class="mt-2">
                        <div class="menu-item" id="allUsersBtn">👥 Все пользователи</div>
                        <div id="usersList" class="hidden mt-2"></div>
                    </div>
                </div>

                <!-- ЦЕНТР - ЧАТ -->
                <div class="chat-area">
                    <div class="chat-header" id="chatHeader">
                        <div class="avatar" id="chatAvatar" style="width:40px;height:40px;">👤</div>
                        <div><strong id="chatName">Выберите чат</strong><br><small id="chatStatus" class="text-sec"></small></div>
                    </div>
                    <div id="messages" class="messages">
                        <div class="text-center text-sec" style="margin-top:40px;">👈 Выберите чат</div>
                    </div>
                    <div class="input-area" id="inputArea" style="display:none;">
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button class="btn btn-primary" id="sendMsgBtn">📤</button>
                    </div>
                </div>

                <!-- ПРАВАЯ КОЛОНКА - ПРОФИЛЬ -->
                <div class="card">
                    <div class="profile-banner" id="profileBanner"></div>
                    <div class="text-center">
                        <div class="profile-avatar" id="profileAvatar">👤</div>
                        <div class="mt-2"><strong id="profileName"></strong></div>
                        <div id="profileBio" class="text-sec"></div>
                    </div>
                    <div class="stats">
                        <div><div id="friendsCount">0</div><small>друзей</small></div>
                        <div><div id="requestsCount">0</div><small>запросов</small></div>
                    </div>
                    <div class="menu-item" id="editAvatarBtn">📷 Сменить аватар</div>
                    <div class="menu-item" id="changeUsernameBtn">✏️ Сменить ник</div>
                    <div class="menu-item" id="plusSettingsBtn" style="background:var(--plus);">💎 Настройки Plus</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    let currentUser = null;
    let currentChat = null;
    let socket = null;
    let userIP = '';
    let captchaValue = 0;

    fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>userIP=d.ip);

    // КАПЧА
    async function loadCaptcha() {
        const res = await fetch('/captcha');
        const data = await res.json();
        captchaValue = data.captcha;
        document.getElementById('captchaNum').innerText = captchaValue;
    }
    loadCaptcha();

    // ТЕМА
    function setTheme(theme) {
        if (theme === 'light') {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }
    setTheme(localStorage.getItem('theme') || 'dark');
    document.getElementById('themeDarkBtn').onclick = () => setTheme('dark');
    document.getElementById('themeLightBtn').onclick = () => setTheme('light');

    // WEBSOCKET
    function initSocket() {
        socket = io();
        socket.on('connect', () => { if (currentUser) socket.emit('register', currentUser.id); });
        socket.on('private-message', (data) => {
            if (currentChat?.type === 'private' && currentChat?.id === data.from) {
                appendMessage(data.msg, false);
            }
            loadFriends();
        });
    }

    function appendMessage(msg, isOwn) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
        div.innerHTML = escapeHtml(msg);
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // ДРУЗЬЯ
    async function loadFriends() {
        const res = await fetch('/friends', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.id }) });
        const data = await res.json();
        document.getElementById('friendsCount').innerText = data.friends.length;
        const container = document.getElementById('friendsList');
        container.innerHTML = '';
        for (const f of data.friends) {
            const userRes = await fetch(`/user/${f.id}`);
            const userData = await userRes.json();
            const friend = userData.success ? userData.user : f;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.onclick = () => selectChat(friend.id, friend.username, friend.avatar, friend.hasPlus, friend.created_at);
            const avatarHtml = friend.avatar ? `<img src="${friend.avatar}">` : friend.username[0];
            div.innerHTML = `<div class="flex"><div class="friend-avatar">${avatarHtml}</div><div><strong>${escapeHtml(friend.username)}</strong> ${friend.hasPlus ? '👑' : ''}<br><small>#${friend.tag}</small></div></div>`;
            container.appendChild(div);
        }
    }

    async function loadRequests() {
        const res = await fetch('/requests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.id }) });
        const data = await res.json();
        document.getElementById('requestsCount').innerText = data.requests.length;
        const container = document.getElementById('requestsList');
        container.innerHTML = '';
        data.requests.forEach(req => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${escapeHtml(req.username)}#${req.tag}</span>
                            <div><button class="btn btn-success" style="padding:4px 8px;" onclick="acceptReq(${req.id}, ${req.user_id})">✅</button>
                            <button class="btn btn-danger" style="padding:4px 8px;" onclick="declineReq(${req.id})">❌</button></div>`;
            container.appendChild(div);
        });
    }

    async function selectChat(id, name, avatar, hasPlus, createdAt) {
        currentChat = { type: 'private', id, name, avatar, hasPlus, createdAt };
        document.getElementById('chatName').innerHTML = `${escapeHtml(name)} ${hasPlus ? '👑' : ''}`;
        document.getElementById('chatAvatar').innerHTML = avatar ? `<img src="${avatar}">` : '👤';
        document.getElementById('chatStatus').innerHTML = `📅 ${createdAt ? new Date(createdAt).toLocaleDateString() : 'неизвестно'}`;
        document.getElementById('inputArea').style.display = 'flex';
        await loadMessages();
    }

    async function loadMessages() {
        if (!currentChat) return;
        const res = await fetch('/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ u1: currentUser.id, u2: currentChat.id }) });
        const data = await res.json();
        const container = document.getElementById('messages');
        container.innerHTML = '';
        (data.messages || []).forEach(m => {
            const isOwn = m.from_user_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
            div.innerHTML = escapeHtml(m.message);
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const msg = document.getElementById('messageInput').value;
        if (!msg || !currentChat) return;
        appendMessage(msg, true);
        socket.emit('private-message', { from: currentUser.id, to: currentChat.id, msg, fromName: currentUser.username });
        await fetch('/send-message', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ from_user_id: currentUser.id, to_user_id: currentChat.id, message: msg }) });
        document.getElementById('messageInput').value = '';
    }

    // ПОИСК
    document.getElementById('searchBtn').onclick = async () => {
        const q = document.getElementById('searchInput').value;
        if (!q) return;
        const res = await fetch('/search', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ q }) });
        const data = await res.json();
        const container = document.getElementById('searchResults');
        if (data.isDiscord) { window.open(`https://discord.com/users/${data.id}`, '_blank'); return; }
        container.innerHTML = '';
        if (data.users) {
            data.users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>${escapeHtml(u.username)}#${u.tag}</span><button class="btn btn-success" style="padding:4px 8px;" onclick="addFriend(${u.id})">➕</button>`;
                container.appendChild(div);
            });
        }
    };

    async function addFriend(id) {
        const res = await fetch('/friend/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ from: currentUser.id, to: id }) });
        const data = await res.json();
        if (data.success) { document.getElementById('searchResults').innerHTML = '<span class="success">✅ Запрос отправлен</span>'; loadRequests(); }
        else alert('❌ ' + data.error);
    }

    window.acceptReq = async (id, fromId) => {
        await fetch('/friend/accept', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, from: fromId, to: currentUser.id }) });
        loadFriends(); loadRequests();
    };
    window.declineReq = async (id) => {
        await fetch('/friend/decline', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
        loadFriends(); loadRequests();
    };

    // АДМИН
    async function loadAdmin() {
        if (currentUser.username === 'prisanok') document.getElementById('adminPanel').classList.remove('hidden');
    }
    document.getElementById('trollBtn').onclick = async () => {
        const name = document.getElementById('trollName').value;
        if (!name) return;
        const res = await fetch('/troll', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: name, adminUsername: currentUser.username }) });
        const data = await res.json();
        if (data.success) location.reload();
        else alert('Ошибка');
    };
    document.getElementById('banBtn').onclick = async () => {
        const name = document.getElementById('banName').value;
        if (!name) return;
        await fetch('/ban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: name, reason: 'Нарушение' }) });
        alert(`✅ ${name} забанен`);
    };
    document.getElementById('givePlusAdminBtn').onclick = async () => {
        const name = document.getElementById('plusUserName').value;
        if (!name) return;
        await fetch('/admin/give-plus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: name, adminUsername: currentUser.username }) });
        alert(`✅ ${name} выдан Plus на 1 час`);
    };
    document.getElementById('allUsersBtn').onclick = async () => {
        const res = await fetch('/all-users');
        const data = await res.json();
        const container = document.getElementById('usersList');
        container.innerHTML = '';
        data.users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `${escapeHtml(u.username)}#${u.tag} ${u.banned ? '(забанен)' : ''}`;
            container.appendChild(div);
        });
        container.classList.toggle('hidden');
    };

    // ПРОФИЛЬ
    async function updateProfileDisplay() {
        document.getElementById('userName').innerText = currentUser.username;
        document.getElementById('userTag').innerText = '#' + currentUser.tag;
        document.getElementById('profileName').innerHTML = `${escapeHtml(currentUser.username)}#${currentUser.tag}`;
        if (currentUser.hasPlus) document.getElementById('plusBadge')?.classList.remove('hidden');
        const av = currentUser.plus_animated_avatar || currentUser.avatar;
        if (av) {
            document.getElementById('userAvatar').innerHTML = `<img src="${av}">`;
            document.getElementById('profileAvatar').innerHTML = `<img src="${av}">`;
        }
        if (currentUser.banner) document.getElementById('profileBanner').style.backgroundImage = `url(${currentUser.banner})`;
        if (currentUser.bio) document.getElementById('profileBio').innerText = currentUser.bio;
    }

    function uploadFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('file', file);
            const res = await fetch('/avatar', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) location.reload();
            else alert('❌ ' + (data.error || 'Ошибка'));
        };
        input.click();
    }
    document.getElementById('editAvatarBtn').onclick = uploadFile;
    document.getElementById('changeUsernameBtn').onclick = async () => {
        if (currentUser.username === 'prisanok') { alert('❌ Создатель не может сменить ник'); return; }
        const newName = prompt('Новый никнейм (3-20):');
        if (!newName) return;
        const res = await fetch('/change-username', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ newUsername: newName }) });
        const data = await res.json();
        if (data.success) location.reload();
        else alert('❌ ' + data.error);
    };
    document.getElementById('plusBtn').onclick = () => window.open('/plus.html', '_blank');
    document.getElementById('plusSettingsBtn').onclick = async () => {
        if (!currentUser.hasPlus) { alert('❌ Только для SWILTS+'); window.open('/plus.html', '_blank'); return; }
        const modal = document.createElement('div');
        modal.style.position = 'fixed'; modal.style.top = '0'; modal.style.left = '0'; modal.style.right = '0'; modal.style.bottom = '0';
        modal.style.background = 'rgba(0,0,0,0.8)'; modal.style.display = 'flex'; modal.style.alignItems = 'center'; modal.style.justifyContent = 'center'; modal.style.zIndex = '2000';
        modal.innerHTML = `<div style="background:var(--card); border-radius:24px; padding:24px; width:300px;"><h3>💎 Настройки Plus</h3><label>Цвет ника</label><input type="color" id="plusColor" value="${currentUser.plus_color || '#818cf8'}"><label>Значок</label><select id="plusBadge"><option value="👑">👑 Корона</option><option value="💎">💎 Бриллиант</option><option value="⭐">⭐ Звезда</option></select><button class="btn btn-primary" id="savePlus" style="margin-top:16px;">Сохранить</button><button class="btn btn-secondary" id="closePlus" style="margin-top:8px;">Закрыть</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('savePlus').onclick = async () => {
            const color = document.getElementById('plusColor').value;
            const badge = document.getElementById('plusBadge').value;
            await fetch('/plus/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ color, badge }) });
            modal.remove();
            location.reload();
        };
        document.getElementById('closePlus').onclick = () => modal.remove();
    };

    // АВТОРИЗАЦИЯ
    async function checkSession() {
        const res = await fetch('/session');
        const data = await res.json();
        if (data.success && data.user) { currentUser = data.user; showMain(); }
    }
    async function login() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.success) { currentUser = data.user; showMain(); }
        else { document.getElementById('loginMsg').innerText = '❌ ' + data.error; }
    }
    async function register() {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const captcha = document.getElementById('regCaptcha').value;
        if (password.length < 6) { document.getElementById('regMsg').innerHTML = '<span class="error">❌ Пароль минимум 6 символов</span>'; return; }
        if (parseInt(captcha) !== captchaValue) { document.getElementById('regMsg').innerHTML = '<span class="error">❌ Неверная капча</span>'; loadCaptcha(); return; }
        const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password, captcha, ip: userIP }) });
        const data = await res.json();
        if (data.success) { currentUser = data.user; showMain(); }
        else { document.getElementById('regMsg').innerHTML = '<span class="error">❌ ' + data.error + '</span>'; loadCaptcha(); }
    }
    function showMain() {
        document.getElementById('authPanel').classList.add('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        updateProfileDisplay();
        loadFriends(); loadRequests(); loadAdmin();
        initSocket();
    }

    document.getElementById('doLogin').onclick = login;
    document.getElementById('doRegister').onclick = register;
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            if (tab.dataset.tab === 'register') loadCaptcha();
        });
    });
    document.getElementById('logoutBtn').onclick = async () => { await fetch('/logout', { method: 'POST' }); location.reload(); };
    document.getElementById('sendMsgBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    checkSession();

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    </script>
</body>
</html>
