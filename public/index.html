<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILTS — Современный мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ТЕМЫ */
        body.dark {
            --bg: #0D1117;
            --card: #161B22;
            --hover: #21262D;
            --input: #0D1117;
            --text: #E6EDF3;
            --text-sec: #8B949E;
            --border: #30363D;
            --accent: #6C63FF;
            --danger: #F85149;
            --success: #3FB950;
            --gradient: linear-gradient(135deg, #6C63FF, #5A52D5);
            --plus: linear-gradient(135deg, #FBBF24, #F59E0B);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        body.light {
            --bg: #F6F8FA;
            --card: #FFFFFF;
            --hover: #F1F3F4;
            --input: #FFFFFF;
            --text: #1F2A3A;
            --text-sec: #57606A;
            --border: #E1E4E8;
            --accent: #6C63FF;
            --danger: #F85149;
            --success: #2DA44E;
            --gradient: linear-gradient(135deg, #6C63FF, #5A52D5);
            --plus: linear-gradient(135deg, #FBBF24, #F59E0B);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* ЖИВОЙ ФОН */
        .live-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(108,99,255,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(251,191,36,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* АВТОРИЗАЦИЯ */
        .auth-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #0a0e1a, #0f1729);
            z-index: 1000;
        }
        .auth-card {
            background: var(--card);
            border-radius: 32px;
            padding: 40px;
            width: 420px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 42px;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            background: var(--input);
            padding: 4px;
            border-radius: 60px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--text-sec);
        }
        .auth-tab.active {
            background: var(--gradient);
            color: white;
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-form input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
        }
        .auth-form button {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .captcha-block { display: flex; gap: 12px; margin-bottom: 16px; }
        .captcha-number {
            background: var(--input);
            padding: 14px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            min-width: 100px;
            border: 1px solid var(--border);
        }
        .error { color: var(--danger); text-align: center; margin-top: 8px; }
        .hidden { display: none; }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: var(--card);
            border-radius: 60px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .user-area { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .grid {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .btn-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--hover);
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
        .btn-icon:hover { background: var(--accent); }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input {
            flex: 1;
            padding: 12px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text);
        }
        .section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-sec);
            margin-bottom: 12px;
        }
        .chat-list { max-height: 250px; overflow-y: auto; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 16px;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .chat-item:hover { background: var(--hover); }
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; font-size: 14px; }

        /* ЧАТ */
        .chat-area {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
        }
        .message-own {
            align-self: flex-end;
            background: var(--accent);
            color: white;
        }
        .message-other {
            align-self: flex-start;
            background: var(--hover);
        }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text);
        }
        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient);
            border: none;
            cursor: pointer;
        }

        /* ПРОФИЛЬ */
        .profile-panel {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow-y: auto;
        }
        .profile-banner {
            width: 100%;
            height: 100px;
            background: var(--gradient);
            background-size: cover;
        }
        .profile-avatar-wrapper { text-align: center; margin-top: -40px; }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--card);
            background: var(--accent);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            overflow: hidden;
        }
        .profile-name { text-align: center; margin-top: 12px; font-weight: bold; }
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            margin: 16px;
            background: var(--hover);
            border-radius: 20px;
        }
        .menu-item {
            padding: 12px;
            margin: 8px;
            background: var(--hover);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
            background: var(--hover);
            border-radius: 20px;
            width: fit-content;
            margin: 0 20px 12px 20px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-sec);
            animation: typingPulse 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingPulse {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-3px); }
        }
        .flex { display: flex; align-items: center; gap: 10px; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 8px; }
    </style>
</head>
<body class="dark">
    <div class="live-bg"></div>

    <!-- АВТОРИЗАЦИЯ -->
    <div id="authPanel" class="auth-wrapper">
        <div class="auth-card">
            <h1>🔷 SWILTS</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">🔑 Вход</div>
                <div class="auth-tab" data-tab="register">📝 Регистрация</div>
            </div>
            <div id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="doLogin">Войти</button>
                <div id="loginMsg" class="error mt-2"></div>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Никнейм (3-20)">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6)">
                <div class="captcha-block">
                    <div class="captcha-number" id="captchaNum">0</div>
                    <input type="text" id="regCaptcha" placeholder="Введите число">
                </div>
                <button id="doRegister">Зарегистрироваться</button>
                <div id="regMsg" class="error mt-2"></div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="mainPanel" class="hidden">
        <div class="app">
            <div class="header">
                <div class="user-area">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div><strong id="userName"></strong><br><span class="text-sec" id="userTag"></span></div>
                </div>
                <div class="flex">
                    <button class="btn-icon" id="themeDarkBtn">🌙</button>
                    <button class="btn-icon" id="themeLightBtn">☀️</button>
                    <button class="btn-icon" id="plusBtn" style="background: var(--plus);">💎</button>
                    <button class="btn-icon" id="logoutBtn">🚪</button>
                </div>
            </div>

            <div class="grid">
                <!-- ЛЕВАЯ ПАНЕЛЬ -->
                <div class="sidebar">
                    <div class="sidebar-header">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Поиск...">
                            <button class="btn-icon" id="searchBtn">🔍</button>
                        </div>
                        <div id="searchResults" class="chat-list"></div>
                    </div>
                    <div class="section">
                        <div class="section-title">📨 ЗАПРОСЫ</div>
                        <div id="requestsList" class="chat-list"></div>
                    </div>
                    <div class="section">
                        <div class="section-title">👥 ДРУЗЬЯ</div>
                        <div id="friendsList" class="chat-list"></div>
                    </div>
                    <div id="adminPanel" class="section hidden">
                        <div class="section-title">👑 АДМИН</div>
                        <div class="menu-item" id="trollBtn">🎭 ТРОЛЛЬ</div>
                        <input type="text" id="trollName" placeholder="Никнейм" class="mt-2" style="width:100%; padding:8px; background:var(--input); border:1px solid var(--border); border-radius:12px;">
                        <div class="menu-item" id="banBtn">🔨 БАН</div>
                        <input type="text" id="banName" placeholder="Никнейм" class="mt-2" style="width:100%; padding:8px; background:var(--input); border:1px solid var(--border); border-radius:12px;">
                        <div class="menu-item" id="givePlusAdminBtn">💎 ВЫДАТЬ PLUS</div>
                        <input type="text" id="plusUserName" placeholder="Никнейм" class="mt-2" style="width:100%; padding:8px; background:var(--input); border:1px solid var(--border); border-radius:12px;">
                        <div class="menu-item" id="allUsersBtn">👥 ВСЕ ПОЛЬЗОВАТЕЛИ</div>
                        <div id="usersList" class="hidden mt-2"></div>
                    </div>
                </div>

                <!-- ЦЕНТР - ЧАТ -->
                <div class="chat-area">
                    <div class="chat-header" id="chatHeader">
                        <div class="avatar" id="chatAvatar" style="width:40px;height:40px;">👤</div>
                        <div><strong id="chatName">Выберите чат</strong><br><span class="text-sec" id="chatStatus"></span></div>
                    </div>
                    <div id="messagesContainer" class="messages-container">
                        <div class="text-center text-sec" style="margin-top:40px;">👈 Выберите чат</div>
                    </div>
                    <div id="typingIndicator" class="typing-indicator hidden">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <span>печатает...</span>
                    </div>
                    <div class="input-area" id="inputArea" style="display:none;">
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendMsgBtn">📤</button>
                    </div>
                </div>

                <!-- ПРАВАЯ ПАНЕЛЬ -->
                <div class="profile-panel">
                    <div class="profile-banner" id="profileBanner"></div>
                    <div class="profile-avatar-wrapper">
                        <div class="profile-avatar" id="profileAvatar">👤</div>
                    </div>
                    <div class="profile-name" id="profileName"></div>
                    <div class="profile-bio" id="profileBio"></div>
                    <div class="stats">
                        <div><div id="friendsCount">0</div><small>друзей</small></div>
                        <div><div id="requestsCount">0</div><small>запросов</small></div>
                    </div>
                    <div class="menu-item" id="editAvatarBtn">📷 Сменить аватар</div>
                    <div class="menu-item" id="changeUsernameBtn">✏️ Сменить ник</div>
                    <div class="menu-item" id="plusSettingsBtn" style="background: var(--plus);">💎 Настройки Plus</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    let currentUser = null;
    let currentChat = null;
    let socket = null;
    let userIP = '';
    let captchaValue = 0;
    let typingTimeout = null;
    let sentMessages = new Set();

    fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>userIP=d.ip);

    async function loadCaptcha() {
        const res = await fetch('/captcha');
        const data = await res.json();
        captchaValue = data.captcha;
        document.getElementById('captchaNum').innerText = captchaValue;
    }
    loadCaptcha();

    function setTheme(theme) {
        if (theme === 'light') {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }
    setTheme(localStorage.getItem('theme') || 'dark');
    document.getElementById('themeDarkBtn').onclick = () => setTheme('dark');
    document.getElementById('themeLightBtn').onclick = () => setTheme('light');

    function initSocket() {
        if (socket) return;
        socket = io();
        
        socket.on('connect', () => {
            if (currentUser) socket.emit('register', currentUser.id);
        });
        
        socket.on('private-message', (data) => {
            // Проверяем, не отправили ли мы сами это сообщение
            const msgKey = `${data.from}_${data.msg}_${data.time}`;
            if (sentMessages.has(msgKey)) return;
            
            if (currentChat?.id === data.from) {
                const container = document.getElementById('messagesContainer');
                const div = document.createElement('div');
                div.className = `message message-other`;
                div.innerHTML = `${escapeHtml(data.msg)}<div class="message-time">${new Date(data.time).toLocaleTimeString()}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }
            loadFriends();
        });
        
        socket.on('message-sent', (data) => {
            // Сообщение подтверждено сервером, удаляем из временного хранилища
            // (ничего не делаем, просто подтверждение)
        });
        
        socket.on('typing', (data) => {
            if (currentChat?.id === data.from) {
                const typingDiv = document.getElementById('typingIndicator');
                typingDiv.classList.remove('hidden');
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    typingDiv.classList.add('hidden');
                }, 1500);
            }
        });
    }

    async function loadFriends() {
        const res = await fetch('/friends', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.id }) });
        const data = await res.json();
        document.getElementById('friendsCount').innerText = data.friends.length;
        const container = document.getElementById('friendsList');
        container.innerHTML = '';
        for (const f of data.friends) {
            const userRes = await fetch(`/user/${f.id}`);
            const userData = await userRes.json();
            const friend = userData.success ? userData.user : f;
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.onclick = () => selectChat(friend.id, friend.username, friend.avatar, friend.hasPlus);
            div.innerHTML = `<div class="chat-avatar">${friend.avatar ? `<img src="${friend.avatar}">` : friend.username[0]}</div>
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(friend.username)} ${friend.hasPlus ? '👑' : ''}</div>
                                <div class="text-sec">#${friend.tag}</div>
                            </div>`;
            container.appendChild(div);
        }
    }

    async function loadRequests() {
        const res = await fetch('/requests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.id }) });
        const data = await res.json();
        document.getElementById('requestsCount').innerText = data.requests.length;
        const container = document.getElementById('requestsList');
        container.innerHTML = '';
        data.requests.forEach(req => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `<div class="chat-info"><div class="chat-name">${escapeHtml(req.username)}#${req.tag}</div></div>
                            <div class="flex">
                                <button class="btn-icon" style="width:30px;height:30px;font-size:12px;" onclick="acceptReq(${req.id}, ${req.user_id})">✅</button>
                                <button class="btn-icon" style="width:30px;height:30px;font-size:12px;background:var(--danger);" onclick="declineReq(${req.id})">❌</button>
                            </div>`;
            container.appendChild(div);
        });
    }

    async function selectChat(id, name, avatar, hasPlus) {
        currentChat = { id, name, avatar, hasPlus };
        document.getElementById('chatName').innerHTML = `${escapeHtml(name)} ${hasPlus ? '👑' : ''}`;
        document.getElementById('chatAvatar').innerHTML = avatar ? `<img src="${avatar}">` : '👤';
        document.getElementById('chatStatus').innerHTML = 'В сети';
        document.getElementById('inputArea').style.display = 'flex';
        await loadMessages();
    }

    async function loadMessages() {
        if (!currentChat) return;
        const res = await fetch('/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ u1: currentUser.id, u2: currentChat.id }) });
        const data = await res.json();
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        (data.messages || []).forEach(m => {
            const isOwn = m.from_user_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'message-own' : 'message-other'}`;
            div.innerHTML = `${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const msg = document.getElementById('messageInput').value;
        if (!msg || !currentChat) return;
        
        // Добавляем сообщение на экран сразу
        const container = document.getElementById('messagesContainer');
        const div = document.createElement('div');
        div.className = `message message-own`;
        div.innerHTML = `${escapeHtml(msg)}<div class="message-time">${new Date().toLocaleTimeString()}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        
        // Запоминаем, что отправили
        const msgKey = `${currentUser.id}_${msg}_${Date.now()}`;
        sentMessages.add(msgKey);
        setTimeout(() => sentMessages.delete(msgKey), 2000);
        
        // Отправляем через сокет
        socket.emit('private-message', {
            from: currentUser.id,
            to: currentChat.id,
            msg: msg,
            fromName: currentUser.username
        });
        
        document.getElementById('messageInput').value = '';
    }

    function onTyping() {
        if (currentChat && socket) {
            socket.emit('typing', { to: currentChat.id, from: currentUser.id });
        }
    }

    // ПОИСК
    document.getElementById('searchBtn').onclick = async () => {
        const q = document.getElementById('searchInput').value;
        const results = document.getElementById('searchResults');
        if (!q) { results.innerHTML = ''; return; }
        const res = await fetch('/search', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ q }) });
        const data = await res.json();
        if (data.isDiscord) { window.open(`https://discord.com/users/${data.id}`, '_blank'); return; }
        results.innerHTML = '';
        if (data.users && data.users.length) {
            data.users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `<div class="chat-info"><div class="chat-name">${escapeHtml(u.username)}#${u.tag}</div></div>
                                <button class="btn-icon" style="width:30px;height:30px;font-size:12px;" onclick="addFriend(${u.id})">➕</button>`;
                results.appendChild(div);
            });
        } else {
            results.innerHTML = '<div class="text-center text-sec">❌ Не найден</div>';
        }
    };

    async function addFriend(id) {
        const res = await fetch('/friend/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ from: currentUser.id, to: id }) });
        const data = await res.json();
        if (data.success) {
            document.getElementById('searchResults').innerHTML = '<div class="text-center" style="color:var(--success);">✅ Запрос отправлен</div>';
            setTimeout(() => document.getElementById('searchResults').innerHTML = '', 2000);
            loadRequests();
        } else alert('❌ ' + data.error);
    }

    window.acceptReq = async (id, fromId) => {
        await fetch('/friend/accept', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, from: fromId, to: currentUser.id }) });
        loadFriends(); loadRequests();
        const friendData = await fetch(`/user/${fromId}`).then(r => r.json());
        if (friendData.success) {
            selectChat(friendData.user.id, friendData.user.username, friendData.user.avatar, friendData.user.hasPlus);
        }
    };
    window.declineReq = async (id) => {
        await fetch('/friend/decline', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
        loadFriends(); loadRequests();
    };

    // АДМИН
    async function loadAdmin() {
        if (currentUser.username === 'prisanok') document.getElementById('adminPanel').classList.remove('hidden');
    }
    document.getElementById('trollBtn').onclick = async () => {
        const name = document.getElementById('trollName').value;
        if (!name) return;
        const res = await fetch('/troll', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: name, adminUsername: currentUser.username }) });
        const data = await res.json();
        if (data.success) location.reload();
        else alert('Ошибка');
    };
    document.getElementById('banBtn').onclick = async () => {
        const name = document.getElementById('banName').value;
        if (!name) return;
        await fetch('/ban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: name, reason: 'Нарушение' }) });
        alert(`✅ ${name} забанен`);
        document.getElementById('banName').value = '';
    };
    document.getElementById('givePlusAdminBtn').onclick = async () => {
        const name = document.getElementById('plusUserName').value;
        if (!name) return;
        await fetch('/admin/give-plus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: name, adminUsername: currentUser.username }) });
        alert(`✅ ${name} выдан Plus на 1 час`);
        document.getElementById('plusUserName').value = '';
    };
    document.getElementById('allUsersBtn').onclick = async () => {
        const res = await fetch('/all-users');
        const data = await res.json();
        const container = document.getElementById('usersList');
        container.innerHTML = '';
        data.users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `${escapeHtml(u.username)}#${u.tag} ${u.banned ? '(забанен)' : ''}`;
            container.appendChild(div);
        });
        container.classList.toggle('hidden');
    };

    // ПРОФИЛЬ
    async function updateProfileDisplay() {
        document.getElementById('userName').innerText = currentUser.username;
        document.getElementById('userTag').innerText = '#' + currentUser.tag;
        document.getElementById('profileName').innerHTML = `${escapeHtml(currentUser.username)}#${currentUser.tag}`;
        if (currentUser.avatar) {
            document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.avatar}">`;
            document.getElementById('profileAvatar').innerHTML = `<img src="${currentUser.avatar}">`;
        }
        if (currentUser.banner) document.getElementById('profileBanner').style.backgroundImage = `url(${currentUser.banner})`;
        if (currentUser.bio) document.getElementById('profileBio').innerText = currentUser.bio;
    }

    function uploadFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('file', file);
            const res = await fetch('/avatar', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) location.reload();
            else alert('❌ ' + (data.error || 'Ошибка'));
        };
        input.click();
    }
    document.getElementById('editAvatarBtn').onclick = uploadFile;
    document.getElementById('changeUsernameBtn').onclick = async () => {
        if (currentUser.username === 'prisanok') { alert('❌ Создатель не может сменить ник'); return; }
        const newName = prompt('Новый никнейм (3-20):');
        if (!newName) return;
        const res = await fetch('/change-username', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ newUsername: newName }) });
        const data = await res.json();
        if (data.success) location.reload();
        else alert('❌ ' + data.error);
    };
    document.getElementById('plusBtn').onclick = () => window.open('/plus.html', '_blank');
    document.getElementById('plusSettingsBtn').onclick = async () => {
        if (!currentUser.hasPlus) { alert('❌ Только для SWILTS+'); window.open('/plus.html', '_blank'); return; }
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.right = '0';
        modal.style.bottom = '0';
        modal.style.background = 'rgba(0,0,0,0.8)';
        modal.style.display = 'flex';
        modal.style.alignItems = 'center';
        modal.style.justifyContent = 'center';
        modal.style.zIndex = '2000';
        modal.innerHTML = `<div style="background:var(--card); border-radius:24px; padding:24px; width:300px;"><h3>💎 Настройки Plus</h3><label>Цвет ника</label><input type="color" id="plusColor" value="${currentUser.plus_color || '#6C63FF'}" style="width:100%; margin:8px 0;"><label>Значок</label><select id="plusBadge" style="width:100%; padding:10px; margin:8px 0;"><option value="👑">👑 Корона</option><option value="💎">💎 Бриллиант</option><option value="⭐">⭐ Звезда</option></select><button class="menu-item" id="savePlus">💾 Сохранить</button><button class="menu-item" id="closePlus">Закрыть</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('savePlus').onclick = async () => {
            const color = document.getElementById('plusColor').value;
            const badge = document.getElementById('plusBadge').value;
            await fetch('/plus/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ color, badge }) });
            modal.remove();
            location.reload();
        };
        document.getElementById('closePlus').onclick = () => modal.remove();
    };

    // АВТОРИЗАЦИЯ
    async function checkSession() {
        const res = await fetch('/session');
        const data = await res.json();
        if (data.success && data.user) { currentUser = data.user; showMain(); }
    }
    async function login() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('loginMsg');
        if (!username || !password) { msgDiv.innerText = '❌ Заполните поля'; return; }
        const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.success) { currentUser = data.user; showMain(); }
        else { msgDiv.innerText = '❌ ' + data.error; }
    }
    async function register() {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const captcha = document.getElementById('regCaptcha').value;
        const msgDiv = document.getElementById('regMsg');
        if (password.length < 6) { msgDiv.innerHTML = '❌ Пароль минимум 6 символов'; return; }
        if (parseInt(captcha) !== captchaValue) { msgDiv.innerHTML = '❌ Неверная капча'; loadCaptcha(); return; }
        const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password, captcha, ip: userIP }) });
        const data = await res.json();
        if (data.success) { currentUser = data.user; showMain(); }
        else { msgDiv.innerHTML = '❌ ' + data.error; loadCaptcha(); }
    }
    function showMain() {
        document.getElementById('authPanel').classList.add('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        updateProfileDisplay();
        loadFriends(); loadRequests(); loadAdmin();
        initSocket();
    }

    document.getElementById('doLogin').onclick = login;
    document.getElementById('doRegister').onclick = register;
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            if (tab.dataset.tab === 'register') loadCaptcha();
        });
    });
    document.getElementById('logoutBtn').onclick = async () => { await fetch('/logout', { method: 'POST' }); location.reload(); };
    document.getElementById('sendMsgBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    document.getElementById('messageInput').addEventListener('input', onTyping);

    checkSession();

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    </script>
</body>
</html>
